services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sealai}
      POSTGRES_USER: ${POSTGRES_USER:-sealai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"

  redis:
    image: redis/redis-stack-server:7.4.0-v8
    container_name: redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDISCLI_AUTH: ${REDIS_PASSWORD}
      REDIS_ARGS: >-
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --save 900 1
        --save 300 10
        --save 60 10000
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --raw PING | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    expose:
      - "6379"

  qdrant:
    image: qdrant/qdrant:v1.16.0
    container_name: qdrant
    restart: unless-stopped
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 1s bash -c '> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  gotenberg:
    image: gotenberg/gotenberg:8.15.0
    container_name: gotenberg
    restart: unless-stopped
    command:
      - gotenberg
      - --chromium-allow-list=file:///tmp/.*
    expose:
      - "3000"

  tika:
    image: apache/tika:2.9.2.1
    container_name: tika
    restart: unless-stopped
    expose:
      - "9998"

  keycloak:
    container_name: keycloak
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sealai}
      KC_DB_USERNAME: ${KC_DB_USERNAME:-sealai}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: "https://auth.sealai.net"
      KC_HOSTNAME_STRICT: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    expose:
      - "8080"
      - "9000"

  backend:
    container_name: backend
    user: "1000:1000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      qdrant: { condition: service_started }
      gotenberg: { condition: service_started }
      tika: { condition: service_started }
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sealai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-sealai}
      POSTGRES_SYNC_URL: ${POSTGRES_SYNC_URL:-postgresql://${POSTGRES_USER:-sealai}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-sealai}}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}
      GOTENBERG_URL: ${GOTENBERG_URL:-http://gotenberg:3000}
      TIKA_URL: ${TIKA_URL:-http://tika:9998}
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      RAG_UPLOAD_DIR: "/app/data/uploads"
      HF_HOME: "/app/data/models"
      FASTEMBED_CACHE_PATH: "/app/data/models"
      ENABLE_METRICS: "true"
      PYTHONUNBUFFERED: "1"
      OPENAI_ROUTER_MODEL: "${OPENAI_ROUTER_MODEL:-gpt-5-nano}"
      GENERATION_MODEL: "gpt-5-large"
      GENERATION_TEMP: "0.2"
      GENERATION_MAX_TOKENS: "1024"
      SEALAI_LOG_LEVEL: "DEBUG"
      CONSULT_GRAPH_DEBUG: "1"
      CONSULT_GRAPH_DEBUG_LEVEL: "debug"
      WS_AUTH_OPTIONAL: "1"
      SEALAI_LG_TRACE: "1"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_JWKS_URL}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
      EXPECTED_AZP: ${EXPECTED_AZP:-nextauth}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --timeout-keep-alive 120
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
  frontend:
    profiles: ["frontend-container"]
    depends_on:
      backend: { condition: service_healthy }
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      BACKEND_INTERNAL_URL: "http://backend:8000"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      NEXTAUTH_DEBUG: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  prometheus:
    image: prom/prometheus@sha256:4a61322ac1103a0e3aea2a61ef1718422a48fa046441f299d71e660a3bc71ae9
    container_name: prometheus
    depends_on:
      backend: { condition: service_started }
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana@sha256:83749231c3835e390a3144e5e940203e42b9589761f20ef3169c716e734ad505
    container_name: grafana
    depends_on:
      prometheus: { condition: service_started }
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  nginx:
    image: nginx:1.29.4
    container_name: nginx
    depends_on:
      backend: { condition: service_started }
      keycloak: { condition: service_started }
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/00-tuning.conf:/etc/nginx/conf.d/00-tuning.conf:ro
      - ./nginx/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD-SHELL", "test -s /var/run/nginx.pid || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  qdrant_storage:
  redis-data:
  prometheus-data:
  grafana-data:
