x-bounded-logging: &bounded-logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
    max-file: ${DOCKER_LOG_MAX_FILE:-3}

x-exporter-security: &exporter-security
  restart: unless-stopped
  read_only: true
  security_opt:
  - no-new-privileges:true
  cap_drop:
  - ALL
  logging: *bounded-logging

services:
  postgres:
    image: postgres:15@sha256:c29ef248e25f5282af03e4b2b61ab7fb076d83d6c8625e75eca1c4b7a8c731a4
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sealai}
      POSTGRES_USER: ${POSTGRES_USER:-sealai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required — set in
        .env or .env.prod}
    volumes:
    - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
    - '5432'
    networks:
      default: {}
      postgres_metrics_network: {}
    logging: *bounded-logging
  redis:
    image: redis/redis-stack-server:7.4.0-v8@sha256:798ab84d9f266936b034ab11c4d04a2b8e4b441884c5aa7d17ac951eefdf742a
    container_name: redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD required — set in .env or .env.prod}
      REDISCLI_AUTH: ${REDIS_PASSWORD:?REDIS_PASSWORD required — set in .env or .env.prod}
      REDIS_ARGS: --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required — set in
        .env or .env.prod} --appendonly yes --save 900 1 --save 300 10 --save 60 10000
        --maxmemory ${REDIS_MAXMEMORY:-1024mb} --maxmemory-policy noeviction
    volumes:
    - redis-data:/data
    healthcheck:
      test:
      - CMD-SHELL
      - redis-cli --raw PING | grep -q PONG
      interval: 10s
      timeout: 5s
      retries: 10
    expose:
    - '6379'
    networks:
      default: {}
      redis_metrics_network: {}
    logging: *bounded-logging
  qdrant:
    image: qdrant/qdrant:v1.16.0@sha256:1005201498cf927d835383d0f918b17d8c9da7db58550f169f694455e42d78f4
    container_name: qdrant
    restart: unless-stopped
    expose:
    - '6333'
    - '6334'
    volumes:
    - qdrant_storage:/qdrant/storage
    healthcheck:
      test:
      - CMD-SHELL
      - timeout 1s bash -c '> /dev/tcp/127.0.0.1/6333' || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      default: {}
      qdrant_metrics_network: {}
    logging: *bounded-logging
  gotenberg:
    image: gotenberg/gotenberg:8.15.0@sha256:59eab80c51ad02b72eb1a972182bae71004b5522644b1f43dfdc48249e996acd
    container_name: gotenberg
    restart: unless-stopped
    command:
    - gotenberg
    - --chromium-allow-list=file:///tmp/.*
    expose:
    - '3000'
    logging: *bounded-logging
  tika:
    image: apache/tika:2.9.2.1@sha256:2be134745fcb59826c54041489946c66218b948ea0c0be3a37cb7919ecc845ba
    container_name: tika
    restart: unless-stopped
    expose:
    - '9998'
    logging: *bounded-logging
  prometheus:
    image: prom/prometheus@sha256:4a61322ac1103a0e3aea2a61ef1718422a48fa046441f299d71e660a3bc71ae9
    container_name: prometheus
    restart: unless-stopped
    read_only: true
    depends_on:
      alertmanager:
        condition: service_started
    expose:
    - '9090'
    volumes:
    - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    - ./monitoring/rules:/etc/prometheus/rules:ro
    - prometheus-data:/prometheus
    secrets:
    - qdrant_read_only_api_key
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-30d}
    - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-8GB}
    networks:
      observability_network: {}
      backend_metrics_network: {}
      keycloak_metrics_network: {}
      qdrant_metrics_network: {}
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    tmpfs:
    - /tmp:size=64m,noexec,nosuid,nodev
    logging: *bounded-logging
    profiles:
    - observability
  alertmanager:
    image: ${ALERTMANAGER_IMAGE:?ALERTMANAGER_IMAGE required - set a tag@sha256 digest-pinned image ref}
    container_name: alertmanager
    restart: unless-stopped
    read_only: true
    expose:
    - '9093'
    volumes:
    - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    - alertmanager-data:/alertmanager
    secrets:
    - alertmanager_webhook_url
    - alertmanager_watchdog_url
    command:
    - --config.file=/etc/alertmanager/alertmanager.yml
    - --storage.path=/alertmanager
    - --data.retention=${ALERTMANAGER_RETENTION_TIME:-120h}
    networks:
      observability_network: {}
      notification_egress_network: {}
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    tmpfs:
    - /tmp:size=32m,noexec,nosuid,nodev
    logging: *bounded-logging
    profiles:
    - observability
  blackbox-exporter:
    <<: *exporter-security
    image: ${BLACKBOX_EXPORTER_IMAGE:?BLACKBOX_EXPORTER_IMAGE required - set a tag@sha256 digest-pinned image ref}
    container_name: blackbox-exporter
    expose:
    - '9115'
    volumes:
    - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
    - --config.file=/etc/blackbox_exporter/config.yml
    networks:
      observability_network: {}
      probe_egress_network: {}
    profiles:
    - observability
  node-exporter:
    <<: *exporter-security
    image: ${NODE_EXPORTER_IMAGE:?NODE_EXPORTER_IMAGE required - set a tag@sha256 digest-pinned image ref}
    container_name: node-exporter
    expose:
    - '9100'
    volumes:
    - /:/host:ro,rslave
    - ${NODE_EXPORTER_TEXTFILE_DIR:?NODE_EXPORTER_TEXTFILE_DIR required}:/var/lib/node-exporter/textfile:ro
    command:
    - --path.rootfs=/host
    - --collector.textfile.directory=/var/lib/node-exporter/textfile
    - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containers/storage/.+)($|/)
    networks:
      observability_network: {}
    profiles:
    - observability
  cadvisor:
    <<: *exporter-security
    image: ${CADVISOR_IMAGE:?CADVISOR_IMAGE required - set a tag@sha256 digest-pinned image ref}
    container_name: cadvisor
    expose:
    - '8080'
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:ro
    - /sys:/sys:ro
    - /var/lib/docker:/var/lib/docker:ro
    - /dev/disk:/dev/disk:ro
    networks:
      observability_network: {}
    profiles:
    - observability
  postgres-exporter:
    <<: *exporter-security
    image: ${POSTGRES_EXPORTER_IMAGE:?POSTGRES_EXPORTER_IMAGE required - set a tag@sha256 digest-pinned image ref}
    container_name: postgres-exporter
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME_FILE: /run/secrets/postgres_exporter_dsn
    secrets:
    - postgres_exporter_dsn
    expose:
    - '9187'
    networks:
      observability_network: {}
      postgres_metrics_network: {}
    profiles:
    - observability
  redis-exporter:
    <<: *exporter-security
    image: ${REDIS_EXPORTER_IMAGE:?REDIS_EXPORTER_IMAGE required - set a tag@sha256 digest-pinned image ref}
    container_name: redis-exporter
    depends_on:
      redis:
        condition: service_healthy
    environment:
    - REDIS_ADDR=redis://redis:6379
    - REDIS_USER=${REDIS_EXPORTER_USER:-sealai_monitor}
    - REDIS_PASSWORD_FILE=/run/secrets/redis_exporter_password
    secrets:
    - redis_exporter_password
    expose:
    - '9121'
    networks:
      observability_network: {}
      redis_metrics_network: {}
    profiles:
    - observability
  grafana:
    image: grafana/grafana@sha256:83749231c3835e390a3144e5e940203e42b9589761f20ef3169c716e734ad505
    container_name: grafana
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped
    read_only: true
    expose:
    - '3000'
    environment:
    - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_password
    - GF_USERS_ALLOW_SIGN_UP=false
    - GF_AUTH_ANONYMOUS_ENABLED=false
    secrets:
    - grafana_admin_password
    volumes:
    - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    - grafana-data:/var/lib/grafana
    networks:
      observability_network: {}
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    tmpfs:
    - /tmp:size=64m,noexec,nosuid,nodev
    logging: *bounded-logging
    profiles:
    - observability
volumes:
  pgdata: null
  qdrant_storage: null
  redis-data: null
  prometheus-data: null
  grafana-data: null
  alertmanager-data: null
secrets:
  qdrant_read_only_api_key:
    environment: QDRANT_READ_ONLY_API_KEY
  alertmanager_webhook_url:
    environment: ALERTMANAGER_WEBHOOK_URL
  alertmanager_watchdog_url:
    environment: ALERTMANAGER_WATCHDOG_URL
  postgres_exporter_dsn:
    environment: POSTGRES_EXPORTER_DSN
  redis_exporter_password:
    environment: REDIS_EXPORTER_PASSWORD
  grafana_admin_password:
    environment: GRAFANA_ADMIN_PASSWORD
networks:
  observability_network:
    internal: true
  backend_metrics_network:
    internal: true
  keycloak_metrics_network:
    internal: true
  qdrant_metrics_network:
    internal: true
  postgres_metrics_network:
    internal: true
  redis_metrics_network:
    internal: true
  notification_egress_network: {}
  probe_egress_network: {}
