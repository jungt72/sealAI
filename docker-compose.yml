services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    env_file: [ ./.env.dev ]
    environment:
      POSTGRES_DB: sealai
      POSTGRES_USER: sealai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"

  redis:
    image: redis/redis-stack-server:7.4.0-v8
    container_name: redis
    restart: unless-stopped
    env_file: [ ./.env.dev ]
    environment:
      REDIS_ARGS: >-
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --save 900 1
        --save 300 10
        --save 60 10000
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" PING | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    expose:
      - "6379"

  qdrant:
    image: qdrant/qdrant:v1.16.0
    container_name: qdrant
    restart: unless-stopped
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      # Wir prüfen nur, ob der Port antwortet, falls kein curl im Image ist
      test: ["CMD-SHELL", "timeout 1s bash -c '> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  keycloak:
    build: { context: ./keycloak, dockerfile: Dockerfile }
    image: ghcr.io/jungt72/sealai-keycloak:latest
    container_name: keycloak
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped
    env_file: [ ./.env.dev ]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/sealai
      KC_DB_USERNAME: sealai
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: "https://auth.sealai.net"
      KC_HOSTNAME_STRICT: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    expose:
      - "8080"

  backend:
    image: sealai-backend:dev
    container_name: backend
    user: "1000:1000"
    build:
      context: ./backend
      args:
        INSTALL_DEV: "true"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      qdrant:   { condition: service_started } # Hier auf service_started zurück, um Qdrant-Probleme zu ignorieren
    restart: unless-stopped
    env_file:
      - ./backend/.env
      - ./.env.dev
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      RAG_UPLOAD_DIR: "/app/data/uploads"
      HF_HOME: "/app/data/models"
      FASTEMBED_CACHE_PATH: "/app/data/models"
      PYTHONUNBUFFERED: "1"
      OPENAI_ROUTER_MODEL: "${OPENAI_ROUTER_MODEL:-gpt-5-nano}"
      GENERATION_MODEL: "gpt-5-large"
      GENERATION_TEMP: "0.2"
      GENERATION_MAX_TOKENS: "1024"
      SEALAI_LOG_LEVEL: "DEBUG"
      CONSULT_GRAPH_DEBUG: "1"
      CONSULT_GRAPH_DEBUG_LEVEL: "debug"
      WS_AUTH_OPTIONAL: "1"
      SEALAI_LG_TRACE: "1"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --timeout-keep-alive 120
    expose:
      - "8000"
    volumes:
      - ./data/backend:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/langgraph/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    container_name: frontend
    image: sealai-frontend:dev
    env_file: [ ./.env.dev ]
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: "${NEXT_PUBLIC_API_BASE:-https://sealai.net/api}"
        NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-https://sealai.net}"
        BUILD_ID: "${BUILD_ID:-dev}"
    depends_on:
      backend: { condition: service_healthy }
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      BACKEND_INTERNAL_URL: "http://backend:8000"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      NEXTAUTH_DEBUG: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.29.4
    container_name: nginx
    depends_on:
      frontend: { condition: service_started }
      backend:  { condition: service_started }
      keycloak: { condition: service_started }
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/00-tuning.conf:/etc/nginx/conf.d/00-tuning.conf:ro
      - ./nginx/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD-SHELL", "test -s /var/run/nginx.pid || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  qdrant_storage:
  redis-data:
