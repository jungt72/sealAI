version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    env_file: [ ./.env.dev ]
    environment:
      POSTGRES_DB: sealai
      POSTGRES_USER: sealai
      # Passwort kommt aus .env.dev / GitHub Secrets
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:7.4.0-v6
    container_name: redis
    restart: unless-stopped
    ports: ["6379:6379"]
    environment:
      REDIS_ARGS: "--appendonly yes --save 900 1 --save 300 10 --save 60 10000"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.15.0
    container_name: qdrant
    command: ["./entrypoint.sh"]
    restart: unless-stopped
    ports: ["6333:6333", "6334:6334"]
    volumes:
      - qdrant_storage:/qdrant/storage

  keycloak:
    build: { context: ./keycloak, dockerfile: Dockerfile }
    image: ghcr.io/jungt72/sealai-keycloak:latest
    container_name: keycloak
    depends_on: [postgres]
    restart: unless-stopped
    env_file: [.env.dev]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/sealai
      KC_DB_USERNAME: sealai
      KC_PROXY: edge
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports: ["8080:8080"]

  backend:
    image: ghcr.io/jungt72/sealai-backend:latest
    container_name: backend
    build: { context: ./backend }
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
      qdrant:   { condition: service_started }
      keycloak: { condition: service_started }
    restart: unless-stopped
    env_file: [ ./backend/.env, ./.env.dev ]
    # Alle Backend-Variablen kommen über env_file (backend/.env, .env.dev)

    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/ping"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 30s

  normen-agent:
    build: { context: ./backend/agents/normen_agent }
    image: ghcr.io/jungt72/sealai-normen-agent:latest
    container_name: normen-agent
    restart: unless-stopped
    environment:
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=9101
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "9101"]
    ports: ["9101:9101"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9101/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  material-agent:
    build: { context: ./backend/agents/material_agent }
    image: ghcr.io/jungt72/sealai-material-agent:latest
    container_name: material-agent
    restart: unless-stopped
    environment:
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=9102
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "9102"]
    ports: ["9102:9102"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9102/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: ghcr.io/jungt72/sealai-frontend:latest
    container_name: frontend
    env_file: [ ./.env.dev ]
    build:
      context: ./frontend
      args:
        # Nur nicht-sensitive Build-Variablen; Secrets nicht als Build-Args übergeben
        NEXT_PUBLIC_API_BASE:   "${NEXT_PUBLIC_API_BASE:-http://localhost:8000}"
        NEXT_PUBLIC_SITE_URL:   "${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}"
        NEXTAUTH_URL:           "${NEXTAUTH_URL:-http://localhost:3000}"
        KEYCLOAK_ISSUER:        "${KEYCLOAK_ISSUER:-http://keycloak:8080/realms/sealAI}"
        KEYCLOAK_CLIENT_ID:     "${KEYCLOAK_CLIENT_ID:-nextauth}"
    depends_on: [backend]
    restart: unless-stopped
    # Laufzeit-Variablen kommen über env_file (.env.dev)
    ports: ["3000:3000"]

  nginx:
    image: nginx:latest
    container_name: nginx
    depends_on:
      frontend: { condition: service_started }
      backend:  { condition: service_started }
      keycloak: { condition: service_started }
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/00-tuning.conf:/etc/nginx/conf.d/00-tuning.conf:ro
      - ./nginx/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD-SHELL", "test -s /var/run/nginx.pid || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  qdrant_storage:
  redis-data:
