services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sealai}
      POSTGRES_USER: ${POSTGRES_USER:-sealai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required — set in
        .env or .env.prod}
    volumes:
    - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
    - '5432'
  redis:
    image: redis/redis-stack-server:7.4.0-v8
    container_name: redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD required — set in .env or .env.prod}
      REDISCLI_AUTH: ${REDIS_PASSWORD:?REDIS_PASSWORD required — set in .env or .env.prod}
      REDIS_ARGS: --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required — set in
        .env or .env.prod} --appendonly yes --save 900 1 --save 300 10 --save 60 10000
        --maxmemory ${REDIS_MAXMEMORY:-1024mb} --maxmemory-policy noeviction
    volumes:
    - redis-data:/data
    healthcheck:
      test:
      - CMD-SHELL
      - redis-cli --raw PING | grep -q PONG
      interval: 10s
      timeout: 5s
      retries: 10
    expose:
    - '6379'
  qdrant:
    image: qdrant/qdrant:v1.16.0
    container_name: qdrant
    restart: unless-stopped
    expose:
    - '6333'
    - '6334'
    volumes:
    - qdrant_storage:/qdrant/storage
    healthcheck:
      test:
      - CMD-SHELL
      - timeout 1s bash -c '> /dev/tcp/127.0.0.1/6333' || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
  gotenberg:
    image: gotenberg/gotenberg:8.15.0
    container_name: gotenberg
    restart: unless-stopped
    command:
    - gotenberg
    - --chromium-allow-list=file:///tmp/.*
    expose:
    - '3000'
  tika:
    image: apache/tika:2.9.2.1
    container_name: tika
    restart: unless-stopped
    expose:
    - '9998'
  prometheus:
    image: prom/prometheus@sha256:4a61322ac1103a0e3aea2a61ef1718422a48fa046441f299d71e660a3bc71ae9
    container_name: prometheus
    restart: unless-stopped
    ports:
    - 127.0.0.1:9090:9090
    volumes:
    - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    - prometheus-data:/prometheus
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    profiles:
    - observability
  grafana:
    image: grafana/grafana@sha256:83749231c3835e390a3144e5e940203e42b9589761f20ef3169c716e734ad505
    container_name: grafana
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped
    ports:
    - 127.0.0.1:3001:3000
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
    - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    - grafana-data:/var/lib/grafana
    profiles:
    - observability
volumes:
  pgdata: null
  qdrant_storage: null
  redis-data: null
  prometheus-data: null
  grafana-data: null
