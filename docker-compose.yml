services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    env_file: [ ./.env.dev ]
    environment:
      POSTGRES_DB: sealai
      POSTGRES_USER: sealai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:7.4.0-v8
    container_name: redis
    restart: unless-stopped
    env_file: [ ./.env.dev ]
    environment:
      REDIS_ARGS: >-
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --save 900 1
        --save 300 10
        --save 60 10000
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" PING | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.16.0
    container_name: qdrant
    restart: unless-stopped
    # PROD: NICHT nach außen publishen
    expose: ["6333", "6334"]
    volumes:
      - qdrant_storage:/qdrant/storage

  keycloak:
    build: { context: ./keycloak, dockerfile: Dockerfile }
    image: ghcr.io/jungt72/sealai-keycloak:latest
    container_name: keycloak
    depends_on: [postgres]
    restart: unless-stopped
    env_file: [ ./.env.dev ]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/sealai
      KC_DB_USERNAME: sealai

      # Reverse Proxy (nginx) -> Keycloak
      KC_PROXY_HEADERS: xforwarded

      # Edge TLS Termination: nginx macht https, Keycloak intern http:8080
      KC_HTTP_ENABLED: "true"

      # Hostname v2 (WICHTIG): nutze KC_HOSTNAME statt hostname-url/hostname-strict-https
      KC_HOSTNAME: "https://auth.sealai.net"
      KC_HOSTNAME_STRICT: "true"

      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    # PROD: NICHT nach außen publishen
    expose: ["8080", "9000"]

  backend:
    image: sealai-backend:dev
    container_name: backend
    build:
      context: ./backend
      args:
        INSTALL_DEV: "true"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      qdrant:   { condition: service_started }
      keycloak: { condition: service_started }
    restart: unless-stopped
    env_file:
      - ./backend/.env
      - ./.env.dev
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"

      OPENAI_ROUTER_MODEL: "${OPENAI_ROUTER_MODEL:-gpt-5-nano}"

      GENERATION_MODEL: "gpt-5-large"
      GENERATION_TEMP: "0.2"
      GENERATION_MAX_TOKENS: "1024"

      SEALAI_LOG_LEVEL: "DEBUG"
      CONSULT_GRAPH_DEBUG: "1"
      CONSULT_GRAPH_DEBUG_LEVEL: "debug"
      WS_AUTH_OPTIONAL: "1"
      SEALAI_LG_TRACE: "1"
    command: ["uvicorn","app.main:app","--host","0.0.0.0","--port","8000","--log-level","debug"]
    # PROD: NICHT nach außen publishen
    expose: ["8000"]
    volumes:
      - ./data/backend:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/langgraph/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    container_name: frontend
    env_file: [ ./.env.dev ]
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: "${NEXT_PUBLIC_API_BASE:-http://backend:8000}"
        NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-https://sealai.net}"
        BUILD_ID: "${BUILD_ID:-dev}"
        NEXT_PUBLIC_STRAPI_URL: "${NEXT_PUBLIC_STRAPI_URL:-https://sealai.net/strapi}"
        NEXT_PUBLIC_IMAGE_BASE_URL: "${NEXT_PUBLIC_IMAGE_BASE_URL:-https://sealai.net/strapi}"
        NEXT_PUBLIC_PARAM_SYNC_DEBUG: "1"
    depends_on:
      backend: { condition: service_healthy }
    restart: unless-stopped
    environment:
      BACKEND_INTERNAL_URL: "http://backend:8000"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"

      NEXT_PUBLIC_STRAPI_URL: "${NEXT_PUBLIC_STRAPI_URL:-https://sealai.net/strapi}"
      NEXT_PUBLIC_IMAGE_BASE_URL: "${NEXT_PUBLIC_IMAGE_BASE_URL:-https://sealai.net/strapi}"

      NEXTAUTH_URL: "https://sealai.net"
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_DEBUG: "true"
      NEXT_PUBLIC_PARAM_SYNC_DEBUG: "1"
    expose: ["3000"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.29.4
    container_name: nginx
    depends_on:
      frontend: { condition: service_started }
      backend:  { condition: service_started }
      keycloak: { condition: service_started }
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/00-tuning.conf:/etc/nginx/conf.d/00-tuning.conf:ro
      - ./nginx/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD-SHELL", "test -s /var/run/nginx.pid || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  qdrant_storage:
  redis-data:
