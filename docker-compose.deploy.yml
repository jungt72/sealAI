services:
  backend:
    container_name: backend
    user: 10001:10001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      gotenberg:
        condition: service_started
      tika:
        condition: service_started
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sealai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required — set in
        .env or .env.prod}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-sealai}
      POSTGRES_SYNC_URL: ${POSTGRES_SYNC_URL:-postgresql://${POSTGRES_USER:-sealai}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-sealai}}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL required — set in .env or .env.prod}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:?QDRANT_COLLECTION required — set in
        .env or .env.prod}
      GOTENBERG_URL: ${GOTENBERG_URL:-http://gotenberg:3000}
      TIKA_URL: ${TIKA_URL:-http://tika:9998}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required — set in .env
        or .env.prod}@redis:6379/0
      APP_ENV: ${APP_ENV:-production}
      SEALAI_LANGGRAPH_CHECKPOINTING: ${SEALAI_LANGGRAPH_CHECKPOINTING:-true}
      LANGGRAPH_V2_REDIS_URL: ${LANGGRAPH_V2_REDIS_URL:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD
        required - set in .env.prod}@redis:6379/0}
      RAG_UPLOAD_DIR: /app/data/uploads
      HF_HOME: /app/data/models
      FASTEMBED_CACHE_PATH: /app/data/models
      ENABLE_METRICS: 'true'
      PYTHONUNBUFFERED: '1'
      OPENAI_ROUTER_MODEL: ${OPENAI_ROUTER_MODEL:-gpt-5-nano}
      SEALAI_CONVERSATION_MODEL: ${SEALAI_CONVERSATION_MODEL:-gpt-4o-mini}
      SEALAI_COMMUNICATION_RUNTIME_MODEL: ${SEALAI_COMMUNICATION_RUNTIME_MODEL:-gpt-4o-mini}
      SEALAI_GOVERNED_ANSWER_COMPOSER_MODEL: ${SEALAI_GOVERNED_ANSWER_COMPOSER_MODEL:-gpt-4o-mini}
      SEALAI_KNOWLEDGE_ANSWER_COMPOSER_MODEL: ${SEALAI_KNOWLEDGE_ANSWER_COMPOSER_MODEL:-gpt-4o-mini}
      SEALAI_ENABLE_FINAL_ANSWER_LAYER: ${SEALAI_ENABLE_FINAL_ANSWER_LAYER:-true}
      SEALAI_ENABLE_COMMUNICATION_RUNTIME_LLM: ${SEALAI_ENABLE_COMMUNICATION_RUNTIME_LLM:-true}
      SEALAI_ENABLE_GOVERNED_ANSWER_COMPOSER: ${SEALAI_ENABLE_GOVERNED_ANSWER_COMPOSER:-true}
      SEALAI_ENABLE_KNOWLEDGE_ANSWER_COMPOSER: ${SEALAI_ENABLE_KNOWLEDGE_ANSWER_COMPOSER:-true}
      SEALAI_ENABLE_ACTIVE_CASE_PROCESS_ANSWER_COMPOSER: ${SEALAI_ENABLE_ACTIVE_CASE_PROCESS_ANSWER_COMPOSER:-true}
      SEALAI_ENABLE_ACTIVE_CASE_SIDE_ANSWER_COMPOSER: ${SEALAI_ENABLE_ACTIVE_CASE_SIDE_ANSWER_COMPOSER:-true}
      SEALAI_ACTIVE_CASE_PROCESS_ANSWER_TIMEOUT_S: ${SEALAI_ACTIVE_CASE_PROCESS_ANSWER_TIMEOUT_S:-8.0}
      SEALAI_ACTIVE_CASE_SIDE_ANSWER_TIMEOUT_S: ${SEALAI_ACTIVE_CASE_SIDE_ANSWER_TIMEOUT_S:-8.0}
      SEALAI_FORCE_LLM_FAST_RESPONDER: ${SEALAI_FORCE_LLM_FAST_RESPONDER:-true}
      HUMAN_COMMUNICATION_LAYER_ENABLED: ${HUMAN_COMMUNICATION_LAYER_ENABLED:-false}
      GENERATION_MODEL: gpt-5-large
      GENERATION_TEMP: '0.2'
      GENERATION_MAX_TOKENS: '1024'
      SEALAI_LOG_LEVEL: ${SEALAI_LOG_LEVEL:-INFO}
      CONSULT_GRAPH_DEBUG: ${CONSULT_GRAPH_DEBUG:-0}
      CONSULT_GRAPH_DEBUG_LEVEL: ${CONSULT_GRAPH_DEBUG_LEVEL:-info}
      WS_AUTH_OPTIONAL: ${WS_AUTH_OPTIONAL:-0}
      SEALAI_LG_TRACE: ${SEALAI_LG_TRACE:-0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY required — set in .env or .env.prod}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-sealai-production}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-}
      SEALAI_TRACE_HASH_SALT: ${SEALAI_TRACE_HASH_SALT:-}
      LANGSMITH_CAPTURE_LLM_CONTENT: ${LANGSMITH_CAPTURE_LLM_CONTENT:-false}
      LANGSMITH_TRACE_LANGGRAPH_CHILDREN: ${LANGSMITH_TRACE_LANGGRAPH_CHILDREN:-false}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-sealai-production}
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT:-}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:?KEYCLOAK_ISSUER required — set in .env or
        .env.prod}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_JWKS_URL:?KEYCLOAK_JWKS_URL required — set in
        .env or .env.prod}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:?KEYCLOAK_CLIENT_ID required — set
        in .env or .env.prod}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:?KEYCLOAK_CLIENT_SECRET required
        — set in .env or .env.prod}
      KEYCLOAK_EXPECTED_AZP: ${KEYCLOAK_EXPECTED_AZP:-${EXPECTED_AZP:-nextauth}}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL required — set in .env or .env.prod}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET required — set in .env or
        .env.prod}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET required — set in .env or .env.prod}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:?ALLOWED_ORIGIN required — set in .env or .env.prod}
      EXPECTED_AZP: ${EXPECTED_AZP:-nextauth}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --timeout-keep-alive
      120
    expose:
    - '8000'
    ports:
    - 127.0.0.1:8000:8000
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://127.0.0.1:8000/health >/dev/null
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE required — set pinned image ref in .env.prod}
    pull_policy: ${BACKEND_PULL_POLICY:-always}
    env_file:
    - path: ./.env.prod
      required: false
    volumes:
    - backend-data:/app/data
  frontend:
    profiles:
    - frontend-container
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    expose:
    - '3000'
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required — set in .env
        or .env.prod}@redis:6379/0
      NEXTAUTH_DEBUG: ${NEXTAUTH_DEBUG:-false}
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://127.0.0.1:3000/api/health >/dev/null
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE required — set pinned image ref in .env.prod}
    pull_policy: ${FRONTEND_PULL_POLICY:-always}
  keycloak:
    container_name: keycloak
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sealai}
      KC_DB_USERNAME: ${KC_DB_USERNAME:-sealai}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:?KC_DB_PASSWORD required — set in .env or .env.prod}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:?KEYCLOAK_ADMIN required — set in .env or .env.prod}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD
        required — set in .env or .env.prod}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: 'true'
      KC_HOSTNAME: ${KC_HOSTNAME:-https://sealingai.com}
      KC_HOSTNAME_STRICT: 'true'
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'true'
    expose:
    - '8080'
    - '9000'
    image: ${KEYCLOAK_IMAGE:?KEYCLOAK_IMAGE required — set pinned image ref in .env.prod}
    pull_policy: ${KEYCLOAK_PULL_POLICY:-always}
    env_file:
    - path: ./.env.prod
      required: false
  nginx:
    image: nginx:1.29.4
    container_name: nginx
    depends_on:
      backend:
        condition: service_started
      keycloak:
        condition: service_started
    restart: unless-stopped
    ports:
    - 80:80
    - 443:443
    volumes:
    - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    - ./nginx/00-tuning.conf:/etc/nginx/conf.d/00-tuning.conf:ro
    - ./nginx/www:/var/www/certbot:ro
    - /etc/letsencrypt:/etc/letsencrypt:ro
    healthcheck:
      test:
      - CMD-SHELL
      - test -s /var/run/nginx.pid || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
volumes:
  backend-data: null
