services:
  frontend:
    profiles:
    - frontend-container
    # depends_on: backend removed 2026-06-25 (V1 backend retired → profile v1-legacy). The
    # BACKEND_INTERNAL_URL/SEALAI_BACKEND_ORIGIN below point at the retired host but the V1 backend
    # saw ZERO product traffic over 24h, so they are inert; left in place for an easy re-enable.
    restart: unless-stopped
    expose:
    - '3000'
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
      SEALAI_BACKEND_ORIGIN: http://backend:8000
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required — set in .env
        or .env.prod}@redis:6379/0
      NEXTAUTH_DEBUG: ${NEXTAUTH_DEBUG:-false}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL required — set in .env or .env.prod}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET required — set in .env or
        .env.prod}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET required — set in .env or .env.prod}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:?KEYCLOAK_ISSUER required — set in .env or
        .env.prod}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:?KEYCLOAK_CLIENT_ID required — set
        in .env or .env.prod}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:?KEYCLOAK_CLIENT_SECRET required
        — set in .env or .env.prod}
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://127.0.0.1:3000/api/health >/dev/null
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE required — set pinned image ref in .env.prod}
    pull_policy: ${FRONTEND_PULL_POLICY:-always}
    networks:
      default:
        aliases:
        - sealai-frontend
  keycloak:
    container_name: keycloak
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sealai}
      KC_DB_USERNAME: ${KC_DB_USERNAME:-sealai}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:?KC_DB_PASSWORD required — set in .env or .env.prod}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:?KEYCLOAK_ADMIN required — set in .env or .env.prod}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD
        required — set in .env or .env.prod}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: 'true'
      KC_HOSTNAME: ${KC_HOSTNAME:-https://sealingai.com}
      KC_HOSTNAME_STRICT: 'true'
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'true'
    expose:
    - '8080'
    - '9000'
    image: ${KEYCLOAK_IMAGE:?KEYCLOAK_IMAGE required — set pinned image ref in .env.prod}
    pull_policy: ${KEYCLOAK_PULL_POLICY:-always}
    env_file:
    - path: ./.env.prod
      required: false
    networks:
      default:
        aliases:
        - sealai-keycloak
  nginx:
    image: nginx:1.29.4
    container_name: nginx
    depends_on:
      keycloak:
        condition: service_started
    restart: unless-stopped
    ports:
    - 80:80
    - 443:443
    volumes:
    - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    - ./nginx/00-tuning.conf:/etc/nginx/conf.d/00-tuning.conf:ro
    - ./nginx/www:/var/www/certbot:ro
    - /etc/letsencrypt:/etc/letsencrypt:ro
    - ./nginx/certs/config:/etc/letsencrypt-analytics:ro
    # V2 cutover mounts — INERT until `include snippets/v2_dashboard.conf;` exists in
    # default.conf. Living here (not in an overlay) so every routine nginx recreate keeps
    # them and config/mount drift is impossible (ops/v2-flip.sh is the only on/off switch).
    - ./nginx/snippets:/etc/nginx/snippets:ro
    - ./frontend-v2/dist:/usr/share/nginx/v2-client:ro
    healthcheck:
      test:
      - CMD-SHELL
      - test -s /var/run/nginx.pid || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
  # V2 green-field backend (cutover arc) — OFF by default behind the `v2` profile; defined HERE
  # (not only in an overlay) so `up -d --remove-orphans` with the standard file set never treats a
  # running backend-v2 as an orphan. Routed only after `ops/v2-flip.sh --apply` enables the nginx
  # snippet. Secrets via --env-file interpolation only (no wholesale .env.prod injection).
  backend-v2:
    container_name: backend-v2
    profiles:
    - v2
    build:
      context: ./backend
      dockerfile: Dockerfile.v2
    user: 10001:10001
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      PYTHONUNBUFFERED: '1'
      # V2-owned auth (M6c validate-in-V2): JWKS fetched on the internal network (no hairpin
      # through nginx); the issuer is the public realm URL (KC_HOSTNAME pins the `iss` claim).
      SEALAI_V2_AUTH_JWKS_URL: ${SEALAI_V2_AUTH_JWKS_URL:-http://sealai-keycloak:8080/realms/sealAI/protocol/openid-connect/certs}
      SEALAI_V2_AUTH_ISSUER: ${SEALAI_V2_AUTH_ISSUER:-https://sealingai.com/realms/sealAI}
      SEALAI_V2_AUTH_AUDIENCE: ${SEALAI_V2_AUTH_AUDIENCE:-sealai-v2}
      # Ops hardening (2026-07-03 deep-dive re-audit, §3): these two gate real runtime access
      # (api/deps.py — the Hersteller-Partner admin/manufacturer surface) but had no compose
      # passthrough, so a `.env.prod` override would have silently done nothing. Defaults match
      # settings.py's own defaults, so this is a pure no-op today — additive-only, zero behavior
      # change until someone actually needs to override a Keycloak role name.
      SEALAI_V2_AUTH_ADMIN_ROLE: ${SEALAI_V2_AUTH_ADMIN_ROLE:-admin}
      SEALAI_V2_AUTH_MANUFACTURER_ROLE: ${SEALAI_V2_AUTH_MANUFACTURER_ROLE:-manufacturer}
      # Ops hardening (2026-07-03): the 6 documented "incident-only kill-switches" (their own
      # settings.py docstrings say they're meant to be env-flippable in an emergency) had no
      # compose passthrough either — same gap, higher stakes (a real incident is exactly the
      # moment you don't want to discover a silent no-op). Defaults match settings.py's own
      # defaults (all True) — pure no-op today, only matters if ever actually flipped.
      SEALAI_V2_UNDERSTAND_ENABLED: ${SEALAI_V2_UNDERSTAND_ENABLED:-true}
      SEALAI_V2_VERIFY_ENABLED: ${SEALAI_V2_VERIFY_ENABLED:-true}
      SEALAI_V2_GROUND_ENABLED: ${SEALAI_V2_GROUND_ENABLED:-true}
      SEALAI_V2_COMPUTE_ENABLED: ${SEALAI_V2_COMPUTE_ENABLED:-true}
      SEALAI_V2_MEMORY_ENABLED: ${SEALAI_V2_MEMORY_ENABLED:-true}
      SEALAI_V2_DISTILL_ENABLED: ${SEALAI_V2_DISTILL_ENABLED:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY required — set in .env or .env.prod}
      # V2 per-role model config (eval-validated by adjudicated run v21-gpt51-gate): L1=gpt-5.1
      # (only model holding the Gegencheck/§9.2 calibration); L3 verifier + helper on Mistral
      # Small 4 (independent check + cost). Values come from .env.prod via --env-file substitution.
      SEALAI_V2_PROVIDER: ${SEALAI_V2_PROVIDER:-mistral}
      SEALAI_V2_L1_PROVIDER: ${SEALAI_V2_L1_PROVIDER:-openai}
      SEALAI_V2_L1_MODEL: ${SEALAI_V2_L1_MODEL:-gpt-5.1}
      SEALAI_V2_VERIFIER_MODEL: ${SEALAI_V2_VERIFIER_MODEL:-mistral-small-2603}
      SEALAI_V2_HELPER_MODEL: ${SEALAI_V2_HELPER_MODEL:-mistral-small-2603}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:?MISTRAL_API_KEY required for the V2 Mistral roles}
      # LangSmith observability (V2 tracing seam: wrap_openai + @traceable, fail-open/observation-only).
      # Values from .env.prod via --env-file interpolation; default OFF so a missing config never traces.
      # ENDPOINT must be NON-EMPTY: the SDK raises "API URL cannot be empty" on an empty value instead
      # of using the cloud, so the default is the US cloud (EU accounts set LANGSMITH_ENDPOINT in
      # .env.prod). The eval never traces (run_eval.sh unsets LANG*); a LangSmith outage never blocks a
      # turn (background submission).
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-sealai-production}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      # Isolation (build-spec §3/§7): own Redis db/ns + own Qdrant collection + own Postgres DB.
      # SEALAI_V2_DATABASE_URL backs memory layers 1-3 + the L4 cross-session seam with the durable
      # SQLAlchemy adapters (system-of-record) — a DEDICATED `sealai_v2` database in the shared
      # postgres instance (own tables, own snapshot/restore unit; the V1 `sealai` DB is never
      # touched). Unset → the in-process store (offline). Values are never logged.
      SEALAI_V2_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-sealai}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required — set in .env or .env.prod}@postgres:5432/sealai_v2
      SEALAI_V2_REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required — set in .env or .env.prod}@redis:6379/1
      SEALAI_V2_REDIS_NAMESPACE: ${SEALAI_V2_REDIS_NAMESPACE:-sealai_v2}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      SEALAI_V2_QDRANT_COLLECTION: ${SEALAI_V2_QDRANT_COLLECTION:-sealai_v2_fachkarten}
      # Phase-1 Qdrant semantic retrieval (eval-validated by adjudicated run v21-qdrant-gate-4).
      # Flip via .env.prod (SEALAI_V2_RETRIEVER_BACKEND=qdrant); the retriever FAIL-SAFES to the
      # in-process keyword matcher on a missing dep / unreachable Qdrant / missing collection.
      SEALAI_V2_RETRIEVER_BACKEND: ${SEALAI_V2_RETRIEVER_BACKEND:-in_process}
      SEALAI_V2_QDRANT_URL: ${SEALAI_V2_QDRANT_URL:-http://qdrant:6333}
      SEALAI_V2_EMBED_CACHE_DIR: ${SEALAI_V2_EMBED_CACHE_DIR:-/app/models}
      # Wave 2 RAG: embedding provider. PROD = openai text-embedding-3-small (1536-dim, RAM-safe — the
      # local e5-large OOM'd the 7.6 GB host; the openai API embeds with NO local model). DATA leaves the
      # box for the embed call (it is an API). fastembed/e5-large is the optional offline alternative (its
      # ONNX cache is the :ro mount below). Prefixes are EMPTY for openai; SINGLE-dash so an explicit
      # empty value in .env.prod is PRESERVED (a `:-` would force the e5 "query:/passage:" prefix back).
      SEALAI_V2_EMBED_PROVIDER: ${SEALAI_V2_EMBED_PROVIDER:-openai}
      SEALAI_V2_EMBED_MODEL: ${SEALAI_V2_EMBED_MODEL:-text-embedding-3-small}
      SEALAI_V2_EMBED_QUERY_PREFIX: "${SEALAI_V2_EMBED_QUERY_PREFIX-query: }"
      SEALAI_V2_EMBED_PASSAGE_PREFIX: "${SEALAI_V2_EMBED_PASSAGE_PREFIX-passage: }"
      # Medium Intelligence Phase-2: L1-NEUTRAL display data (never fed to L1/L3 → golden byte-identical).
      SEALAI_V2_MEDIUM_INTEL_ENABLED: ${SEALAI_V2_MEDIUM_INTEL_ENABLED:-false}
      # Kandidaten-Spezifikation (Produktspec v3.1): wired but OFF by default — owner governance gate
      # (expert Fachfreigabe + DIN-Lizenz + UI-Sprache). L1-neutral render surface; flip when cleared.
      SEALAI_V2_PRODUKTSPEC_ENABLED: ${SEALAI_V2_PRODUKTSPEC_ENABLED:-false}
      # V2.2 INC-COVERAGE-GATE: deterministic case-level coverage_status, wired but OFF by default —
      # goes productive only when the extended eval ruler is green (I-CAL-1). Byte-identical when unset.
      SEALAI_V2_COVERAGE_GATE_ENABLED: ${SEALAI_V2_COVERAGE_GATE_ENABLED:-false}
      # INC-BASELINE-HARDENING: RWDR shaft-Ø derivation + speed-trap/unclear-medium prompt discipline,
      # wired but OFF by default. Byte-identical when unset.
      SEALAI_V2_BASELINE_HARDENING_ENABLED: ${SEALAI_V2_BASELINE_HARDENING_ENABLED:-false}
      # INC-NARRATOR-CONTRACT: L1 renders the kernel answer-contract + claim-level guard (regenerate-on-BLOCK).
      # Activated 2026-06-29 via eval-REPLAY narrator-contract-replay (tree 98edd308, L1 gpt-5.1).
      SEALAI_V2_RESPONSE_CONTRACT_ENABLED: ${SEALAI_V2_RESPONSE_CONTRACT_ENABLED:-false}
      # P0-B: widens the claim-level output_guard to non-Gegencheck turns (guard-only contract, NEVER
      # passed to generate() — see response_contract.build_guard_contract's docstring). Activated
      # 2026-07-03 after the targeted offline eval (eval/general_guard_eval.py) showed overblock_rate=0.0
      # on realistic grounded answers, plus 3 confirmed known-limitation cases (still correctly blocks).
      SEALAI_V2_RESPONSE_CONTRACT_GENERAL_GUARD_ENABLED: ${SEALAI_V2_RESPONSE_CONTRACT_GENERAL_GUARD_ENABLED:-false}
      # Material-Parameter-Tabelle: grounded kennwerte rendered as a table (numbers live in the kernel seed)
      SEALAI_V2_MATERIAL_PARAM_TABLE_ENABLED: ${SEALAI_V2_MATERIAL_PARAM_TABLE_ENABLED:-false}
      # Paperless auto-ingestion (POST /internal/rag/ingest, api/routes/rag_ingest.py): fetches
      # a newly consumed rag:enabled document + LLM-extracts a DRAFT Fachkarte (never reviewed).
      # Values are never logged; unset -> the route fails safe (paperless_not_configured / 401).
      PAPERLESS_URL: ${PAPERLESS_URL:-}
      PAPERLESS_TOKEN: ${PAPERLESS_TOKEN:-}
      PAPERLESS_WEBHOOK_TOKEN: ${PAPERLESS_WEBHOOK_TOKEN:-}
    volumes:
    # Pre-staged e5-large ONNX cache (FastEmbed) — read-only; avoids a ~2GB cold download on the
    # health-gated recreate. uid 10001 reads via the bind mount (the cache contents are world-readable).
    - /home/thorsten/sealai-v2-fastembed:/app/models:ro
    expose:
    - '8001'
    ports:
    - 127.0.0.1:8001:8001
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://127.0.0.1:8001/health >/dev/null
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      default:
        aliases:
        - sealai-backend-v2
volumes:
  backend-data: null
