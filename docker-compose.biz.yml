version: "3.9"

# Biz-Services (Strapi + Odoo) in eigenem Compose-Projekt starten:
#   docker compose -p biz -f docker-compose.biz.yml up -d
#
# Hintergrund: Die Container liefen zuvor im Projekt "sealai" und wurden beim
#   docker compose up ...
# als "orphan containers" erkannt. Durch eigenes Projekt verschwinden die Orphans.

services:
  # Strapi hängt an SealAI-Postgres (Host: postgres) → braucht Netzwerkzugriff auf sealai_default.
  strapi:
    image: sealai-strapi
    container_name: strapi
    restart: unless-stopped
    env_file: [ ./strapi-backend/.env ]
    command: ["npm", "run", "develop"]
    volumes:
      - strapi_uploads:/app/public/uploads
    networks:
      - sealai

  # Odoo (eigene Postgres-Instanz)
  odoo-db:
    image: postgres:15
    container_name: odoo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:16
    container_name: odoo
    restart: unless-stopped
    depends_on:
      odoo-db: { condition: service_healthy }
    environment:
      HOST: odoo-db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - ./odoo/addons:/mnt/extra-addons
      - odoo_web_data:/var/lib/odoo
    ports:
      - "127.0.0.1:8069:8069"

volumes:
  # Reuse existing volumes (created previously under the "sealai" project)
  strapi_uploads:
    external: true
    name: sealai_strapi_uploads
  odoo_web_data:
    external: true
    name: sealai_odoo-web-data
  odoo_db_data:
    external: true
    name: sealai_odoo-db-data

networks:
  sealai:
    external: true
    name: sealai_default

