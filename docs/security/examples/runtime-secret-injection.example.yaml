# Schema-only example. Runtime values come from the approved secret store.
version: 1
runtime_environment:
  OPENAI_API_KEY: SET_IN_SECRET_STORE
  MISTRAL_API_KEY: SET_IN_SECRET_STORE
  KEYCLOAK_CLIENT_SECRET: SET_IN_SECRET_STORE
  POSTGRES_PASSWORD: SET_IN_SECRET_STORE
  REDIS_PASSWORD: SET_IN_SECRET_STORE
  NEXTAUTH_SECRET: SET_IN_SECRET_STORE
  DATABASE_URL: INJECT_AT_RUNTIME

rules:
  commit_values: false
  log_values: false
  persist_rotation_values: false
  inject_at_runtime_only: true
