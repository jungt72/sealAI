# sops encryption rules for sealAI production secrets. Values are encrypted;
# keys stay readable so diffs show which secret changed, never its content.
# Decrypting requires the age private key at ~/.config/sops/age/keys.txt on
# the VPS -- that key itself is never committed anywhere.
#
# The encrypted artifact deliberately does NOT live at a .env*-shaped path:
# ops/check-secret-hygiene.py's filename.env rule rejects any committed file
# whose name looks like an env file, regardless of content, and that
# blanket rule is not something to weaken just for this one exception.
creation_rules:
  - path_regex: (\.env\.prod|ops/env-prod\.sops)$
    input_type: dotenv
    output_type: dotenv
    age: age1l9ccs3kmva5wun7v2sv5af2274xqh3turn4j62rvqkz5fqxrra2qfj4maa
