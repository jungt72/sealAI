route:
  receiver: external-primary
  group_by: [alertname, severity, category]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: external-watchdog
      matchers:
        - alertname="SealAIWatchdog"
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 1m

receivers:
  - name: external-primary
    webhook_configs:
      - url_file: /run/secrets/alertmanager_webhook_url
        send_resolved: true
  - name: external-watchdog
    webhook_configs:
      - url_file: /run/secrets/alertmanager_watchdog_url
        send_resolved: true
