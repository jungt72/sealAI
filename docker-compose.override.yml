services:
  backend:
    environment:
      AUTH_DEBUG: "1"

  worker:
    image: sealai-backend:dev
    container_name: worker
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      qdrant:   { condition: service_started }
      keycloak: { condition: service_started }
    restart: unless-stopped
    env_file:
      - ./backend/.env
      - ./.env.dev
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"

      HF_HOME: "/app/.cache/huggingface"
      SENTENCE_TRANSFORMERS_HOME: "/app/.cache/sentence_transformers"
      FASTEMBED_CACHE_PATH: "/app/.cache/fastembed"

      RAG_SHARED_TENANT_ENABLED: "1"
      RAG_SHARED_TENANT_ID: "default"

      SEALAI_LOG_LEVEL: "DEBUG"
    command: ["python3", "-c", "from app.services.jobs.worker import start_job_worker; import asyncio; asyncio.run(start_job_worker())"]
    volumes:
      - ./data/backend:/app/data
      - ./backend:/app/backend
      - backend-cache:/app/.cache
