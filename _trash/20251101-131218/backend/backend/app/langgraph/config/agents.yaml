# MIGRATION: Phase-2 – expanded agent configuration with full specification
material:
  model:
    name: gpt-4.1-mini
    temperature: 0.1
    max_output_tokens: 2048
  prompt:
    agent: prompts/material/material_agent.md
    synthesis: prompts/material/synthesis.md
    variant: default
  rag:
    index_id: materials
    top_k: 5
    hybrid: true
    filters:
      domain: material
    cache_ttl_seconds: 3600
  tools:
    list:
      - material_calculator
      - standards_lookup
    timeout_ms: 30000
    concurrency: 2
    circuit_breaker:
      enabled: true
      threshold: 5
    retry:
      max_tries: 3
      backoff_ms: 1000
  limits:
    latency_ms: 20000
    rounds: 5
    tokens_out: 2048
  budget:
    max_tool_calls: 10
    max_llm_calls: 5

