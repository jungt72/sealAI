apiVersion: v1
kind: Secret
metadata:
  name: sealai-secrets
  namespace: sealai
type: Opaque
stringData:
  # Fill in real values before applying
  OPENAI_API_KEY: "sk-REPLACE_ME"
  POSTGRES_PASSWORD: "change_me"
  NEXTAUTH_SECRET: "change_me"
  KEYCLOAK_CLIENT_SECRET: ""
  # DSNs including password (edit to match your values)
  database_url: "postgresql+asyncpg://sealai:change_me@postgres.sealai.svc.cluster.local:5432/sealai"
  POSTGRES_SYNC_URL: "postgresql://sealai:change_me@postgres.sealai.svc.cluster.local:5432/sealai"
