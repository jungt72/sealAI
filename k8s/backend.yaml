apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: sealai
spec:
  replicas: 1
  selector:
    matchLabels: {app: backend}
  template:
    metadata:
      labels: {app: backend}
    spec:
      containers:
        - name: backend
          image: ghcr.io/jungt72/sealai-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: {name: sealai-config}
            - secretRef: {name: sealai-secrets}
          # DSNs are provided directly via secret.sealai-secrets (database_url, POSTGRES_SYNC_URL)
          readinessProbe:
            httpGet: {path: /api/v1/ping, port: 8000}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: sealai
spec:
  selector: {app: backend}
  ports:
    - name: http
      port: 8000
      targetPort: 8000
