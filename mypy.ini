# SeaLAI MyPy Configuration
# Strategy: permissive for legacy, strict for new Sprint 1+ code
# See: audits/gate_0_to_1_2026-04-19.md section 7.3

[mypy]
python_version = 3.11

# Global defaults — permissive (legacy tier)
ignore_missing_imports = True
check_untyped_defs = False
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
no_implicit_optional = True
strict_optional = False
show_error_codes = True
pretty = True

# Exclude generated code, third-party, virtual envs
exclude = (?x)(
      ^venv/
    | ^\.venv/
    | ^backend/\.venv/
    | ^node_modules/
    | ^frontend/
    | ^build/
    | ^dist/
    | ^backend/app/_legacy_v2/
    | _pb2\.py$
  )

# Strict tier — Sprint 1+ new code
[mypy-backend.app.domain.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True
warn_return_any = True
no_implicit_optional = True
strict_equality = True
check_untyped_defs = True
disallow_untyped_decorators = True

[mypy-backend.app.services.case_service.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True
warn_return_any = True
check_untyped_defs = True

