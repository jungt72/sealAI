      - Bound snapshot hashes, runtime observations, provider mode, image digest, source tree, migration digest, dataset epoch, and authority epoch into final RC evidence.
      - Kept stub-provider runs mechanically non-eligible and required the eligible external-provider run to stay behind its separate budget approval.
    tests:
