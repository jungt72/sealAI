    residual_risk: Git history, clones, backups, and any still-active credential remain exposed until rotation and separately approved history remediation complete.

  - finding_id: SEC-002
    title: Secret-adjacent environment files and dumps are readable by local users
    original_severity: CRITICAL
    verified_severity: CRITICAL
    verification_status: CONFIRMED
    production_affected: true
    affected_components: [VPS filesystem, environment rollbacks, release backups, database dumps]
    root_cause: Environment and backup sprawl, permissive umask or copy modes, and missing retention and permission gates.
    dependencies: [SEC-001, exact metadata-only file inventory, service ownership mapping]
    remediation_type: [configuration, operational, credential_rotation, governance]
    implementation_status: IN_PROGRESS
    evidence_before:
      - audit/2026-07-14-vps-deep-audit/12-findings.md#SEC-002
      - metadata-only count of 164 mode-0664 secret-adjacent files
    changes:
      - Prepare an object-specific 0600 or 0700 permission plan without recursive chmod.
      - Enforce safe creation modes and retention in repository tooling.
    tests:
      - Metadata policy test for files, directories, backups, and exceptions.
      - Release artifact creation-mode test.
    production_action_required: true
    approval_gate: GATE-02
    rollback: Relax only a proven service-owned object to its documented prior mode; never apply a blanket permission rollback.
    evidence_after:
      - Metadata-only inventory contains 253 permission-relevant production records and is stored untracked with mode 0600; checksum is recorded in the run evidence manifest.
      - Object-specific permission runbook is implemented locally; no production mode or owner was changed.
    residual_risk: Existing host users can retain read access until the exact permission gate and related rotations are completed.

  - finding_id: OPS-001
    title: Docker data filesystem is at 95 percent and both systemd guards fail
    original_severity: CRITICAL
    verified_severity: CRITICAL
    verification_status: CONFIRMED
    production_affected: true
    affected_components: [Docker root, Postgres, Redis, Qdrant, images, backups, releases]
    root_cause: Shared-host capacity and retention drift plus missing or contradictory guard implementations without actionable alerting.
    dependencies: [release freeze, object-specific storage inventory, verified recovery source]
    remediation_type: [code, configuration, infrastructure, operational]
    implementation_status: IMPLEMENTED_NOT_DEPLOYED
    evidence_before:
      - audit/2026-07-14-vps-deep-audit/12-findings.md#OPS-001
      - .ai-remediation/runs/REM-2026-07-14/production-fingerprint.json
    changes:
      - Replaced the destructive legacy cleanup path with one root-owned, non-destructive 75/85/80 disk guard, structured redacted events, fixed locks, and release or backup preflights.
      - Added a global storage-mutation lease and a hash-bound GATE-08 bootstrap which installs only the remediation controls while normal releases remain frozen.
      - Added an exact GATE-03 image-removal manifest and executor which protects active, stopped, staging, rollback, legacy, and foreign-workload images and never invokes prune.
      - Enforced the release freeze across host entrypoints, staging, dashboard builds, backend and Keycloak image publication, migrations, pulls, and deployment boundaries.
    tests:
      - Disk threshold, hysteresis, inode and symlink safety, global locking, active-volume protection, and external-alert contracts.
      - Gate-08 root-bootstrap, release-freeze, Bash-function poisoning, workflow publication-denial, staging, V2 cutover rollback, and dashboard output-guard tests.
      - GATE-03 manifest drift, exact-object protection, signal-boundary, indeterminate-result, minimum-reclaim, and recovery-source tests.
    production_action_required: true
    approval_gate: GATE-03
    rollback: Guard code is independently revertible; approved cleanup is recoverable only from its named verified backup or artifact source.
    evidence_after:
      - docs/ops/docker-disk-guard.md
      - docs/ops/production-release-freeze.md
      - docs/ops/gate-03-storage-cleanup.md
      - .ai-remediation/runs/REM-2026-07-14/storage-inventory.yaml
      - 198 P0-B tests and 7 evaluation or tree-hash tests passed with one expected platform skip; frontend verify passed 306 tests and npm audit reported zero vulnerabilities.
    residual_risk: ENOSPC can interrupt stateful services until production headroom is below 85 percent and guards are operational.

  - finding_id: OPS-002
    title: Redis is near maxmemory, heavily swapped, noeviction, and almost without TTLs
    original_severity: HIGH
    verified_severity: HIGH
    verification_status: CONFIRMED
    production_affected: true
    affected_components: [Redis DB0, retired V1 LangGraph checkpoints, small Celery or Kombu state, other shared-instance consumers]
    root_cause: A retired V1 LangGraph checkpointer left persistent unbounded DB0 state, while unrelated consumers share one global memory limit and V2 Compose misleadingly injects unused Redis settings.
    dependencies: [data-owner retention decision, isolated Redis Stack restore, persistence verification, OPS-001]
    remediation_type: [code, configuration, infrastructure, operational]
    implementation_status: IMPLEMENTED_NOT_DEPLOYED
    evidence_before:
      - audit/2026-07-14-vps-deep-audit/12-findings.md#OPS-002
      - .ai-remediation/runs/REM-2026-07-14/production-fingerprint.json
    changes:
      - Removed dead V2 and marketing Redis wiring and made V2 API plus its Postgres outbox executable without Redis, Celery, or Kombu.
      - Added a fail-closed read-only capacity guard with exact Unix-socket peer binding, namespace ownership, TTL and queue metrics, fixed 70/75/80 thresholds, write-error and eviction checks, cardinality bounds, and aggregate-only output.
      - Added a two-pass read-only legacy inventory verifier; execution, approval, local report creation, and every Redis mutation are hard-disabled until exact key selection, recovery evidence, and GATE-04 exist.
      - Kept noeviction unchanged and hard-disabled exact-answer cache activation until a mutable authority epoch is atomically coupled.
    tests:
      - V2 dependency, import, Compose, and Redis-absent runtime contract tests.
      - Memory threshold, write-error, namespace redaction, unknown-category, non-rebuildable-state, socket peer, RESP budget, policy drift, and state continuity tests.
      - Duplicate-input, Bool-as-integer, container drift, two-pass consistency, evidence-expiry, no-write, and no-mutation tests for the GATE-04 observer.
    production_action_required: true
    approval_gate: GATE-04
    rollback: Disable new cache behavior or restore prior scoped configuration; never bulk-delete and restore durable state only from verified persistence.
    evidence_after:
      - .ai-remediation/runs/REM-2026-07-14/redis-inventory-summary.json
      - Read-only aggregate inventory attributes 190834 documents and secondary registries to the retired V1 LangGraph checkpointer; active clients map only to Paperless and V2 DB1 is empty.
      - docs/ops/redis-capacity-guard.md
      - docs/ops/gate-04-redis-remediation.md
      - 2007 V2 tests, 44 Redis guard tests, and 32 GATE-04 observer tests passed; independent reviews found no remaining findings in those controls.
    residual_risk: Production remains near maxmemory and can still reject writes after roughly another 31.6 MiB. The guard is not deployed, external alert delivery is blocked, and cleanup execution intentionally does not exist until recovery evidence, exact collision-free selection, GATE-04, and GATE-08 are satisfied.

  - finding_id: REL-001
    title: Final release gate does not attest the exact production retrieval and image path
    original_severity: HIGH
    verified_severity: HIGH
    verification_status: CONFIRMED
    production_affected: true
    affected_components: [evaluation runner, deployment gate, release script, image build, retrieval dependencies]
    root_cause: The gate binds source settings rather than effective runtime, dataset and authority epochs, and one promoted image digest.
    dependencies: [P0 secrets, P0 storage, P0 Redis, immutable build contract]
    remediation_type: [code, configuration, infrastructure, operational, governance]
    implementation_status: IMPLEMENTED_NOT_DEPLOYED
    evidence_before:
      - audit/2026-07-14-vps-deep-audit/12-findings.md#REL-001
      - Pull request 288 activates a limited adaptive path and adds a migration but leaves the final release-gate implementation unchanged.
    changes:
      - Bound control commit, source commit, served-tree hash, database-migration digest, exact backend image digest, effective runtime, and external RC evidence into one root-trusted promotion transaction.
      - Made provisional, targeted, stub-provider, mutable-image, stale-evidence, and waiver paths mechanically ineligible for final promotion.
      - Kept the checked-in release freeze and Gate-10 lift disabled; repository implementation alone cannot publish or deploy an artifact.
    tests:
      - Exact-artifact, effective-runtime, migration-digest, RC-isolation, receipt-expiry, source/control drift, and rollback-manifest tamper tests.
      - Root-boundary invocation tests prove ordinary workflow inputs cannot bypass the installed gate or storage lease.
    production_action_required: true
    approval_gate: GATE-08
    rollback: Revert gate code only to another fail-closed tested version; never restore the permissive final gate.
    evidence_after:
      - docs/ops/production-release-freeze.md
      - docs/ops/PRODUCTION_PROMOTION_CONTROL.md
      - ops/production_release_control.py
      - ops/v2_rc_evidence.py
      - backend/tests/test_production_release_control.py
      - backend/tests/test_v2_rc_evidence.py
    residual_risk: Production still uses the audited release path. Installation, external exact-digest RC evidence, GATE-08, GATE-10, and a controlled smoke are required before the new transaction can be trusted operationally.

