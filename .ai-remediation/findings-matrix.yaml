  - finding_id: DR-001
    title: Backups share the production failure domain and complete restore is unproven
    original_severity: HIGH
    verified_severity: HIGH
    verification_status: CONFIRMED
    production_affected: true
    affected_components: [Postgres, Qdrant, Redis, uploads, configuration, disaster recovery]
    root_cause: Backups were designed for local corruption recovery rather than encrypted offsite disaster recovery and full-host reconstruction.
    dependencies: [external object storage access, immutable manifest, OPS-001, REL-002]
    remediation_type: [configuration, infrastructure, operational, governance]
    implementation_status: IMPLEMENTED_NOT_DEPLOYED
    evidence_before:
      - audit/2026-07-14-vps-deep-audit/12-findings.md#DR-001
    changes:
      - Added fail-closed target and capacity binding, no-clobber publication, checksums, fixed command timeouts, lifecycle locks, and safe local retention for Postgres and Qdrant backups.
      - Added a provider-neutral encrypted-offsite receipt contract binding local plaintext, downloaded ciphertext, decrypted plaintext, object identity, and versioned key identity.
      - Hardened Qdrant snapshot deletion and restore to preserve the verified local inode, wait for completion, and validate the exact success response.
      - Added an immutable manifest-v2 full-recovery set covering Postgres, Qdrant, uploads, documents, configuration, and secret-recovery identifiers without secret values; every file binds its actual mtime_ns alongside path, size, mode, and digest.
      - Added provider-neutral Restic transport with no inherited credential environment, short manifest-bound Gate-08 approvals, dry-run-only retention, non-authoritative local observations, and externally attested full-download receipt requirements.
      - Added a dedicated internal-network restore runner for Postgres integrity, Qdrant checksum/point/tenant invariants, file verification, fail-closed local RPO/RTO observations, and monthly scheduling.
      - Manifest and local-evidence creation reject actual payload mtimes outside RPO even when recovery-point timestamps are freshly self-declared; local writers can emit only LOCAL_EVIDENCE_ONLY and local verifiers always require a future trusted external receipt importer.
      - The restore runner verifies a short-lived Gate-08 receipt bound to the exact set and snapshot identifier before any full-data read, then rebinds it to the restored manifest before containers start.
    tests:
      - Capacity stop conditions, descriptor and inode binding, poisoned environment and shell functions, no-clobber publication, retention, checksum, offsite receipt, Qdrant deletion, and restore-response tests.
      - Empty-host execution against real offsite data remains blocked on external storage, key custody, a dedicated runner, P1-D rebuild authority, and Gate-08.
      - Adversarial manifest-mtime, non-elevating local evidence, secret-inventory, Qdrant-plan, metrics, and isolated-runner contract tests.
      - Stale payload/recovery-point evidence, forged VERIFIED status/provenance, missing-component metric, pre-download gate-order, set/snapshot mismatch, and missing-snapshot-binding regressions; 95 combined backup/DR tests passed.
    production_action_required: true
    approval_gate: GATE-08
    rollback: Add offsite copies without reducing local retention until two successful restore drills.
    evidence_after:
      - docs/runbooks/backup-storage-safety.md
      - ops/RESTORE.md
      - ops/dr_recovery.py
      - ops/dr_offsite.sh
      - ops/dr_restore_drill.sh
      - ops/dr/restore-compose.yml
      - docs/runbooks/disaster-recovery.md
      - Local backup safety tests passed; no production backup, deletion, offsite transfer, or restore was executed.
    residual_risk: Host or volume loss can destroy production and all local recovery material until external storage/key custody and two isolated drills are configured under Gate-08; Postgres-only Qdrant rebuild remains blocked on P1-D.

