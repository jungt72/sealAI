    dependencies: [P0 secret containment, credential inventory, service-safe rotation order]
    remediation_type: [code, configuration, operational, credential_rotation, governance]
    implementation_status: IMPLEMENTED_NOT_DEPLOYED
    evidence_before:
      - audit/2026-07-14-vps-deep-audit/12-findings.md#SEC-001
      - tracked-path and credential-type inspection with values suppressed
    changes:
      - Removed 17 credential, raw diagnostic, and host-specific ACME account artifacts from the current tree and sanitized safe examples.
      - Added fail-closed filename and content scanning, local hook enforcement, CI, lifecycle documentation, and rotation plan.
    tests:
      - Synthetic PEM, JWK, JWT, bearer, API-key, connection-string, and extensionless fixtures.
      - Full tracked-tree scan and redaction tests.
    production_action_required: true
    approval_gate: GATE-01
    rollback: Scanner and documentation commits are revertible; revoked or rotated credentials must never be restored.
    evidence_after:
