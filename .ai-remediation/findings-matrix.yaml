  - finding_id: AUTH-002
    title: JWKS cache delays key revocation and unknown key IDs trigger synchronous refetches
    original_severity: HIGH
    verified_severity: HIGH
    verification_status: CONFIRMED
    production_affected: true
    affected_components: [backend JWT validation, Keycloak]
    root_cause: Process-local JWKS caching has no bounded freshness, single-flight refresh, or negative cache.
    dependencies: [revocation SLA, Keycloak cache-control behavior, AUTH-001]
    remediation_type: [code, configuration, operational]
    implementation_status: IMPLEMENTED_NOT_DEPLOYED
    evidence_before:
      - audit/2026-07-14-vps-deep-audit/12-findings.md#AUTH-002
    changes:
      - Added bounded fresh/stale JWKS windows, single-flight refresh, unknown-kid negative caching, key-rotation handling, maximum token age, and fail-closed identity-provider outage behavior.
      - Enforced issuer, audience, expiration, subject, and token-time validation without accepting an indefinitely stale signing key.
    tests:
      - Unknown kid, parallel amplification, key rotation, expired/old token, revoked key, Keycloak outage, stale cache, issuer, audience, and malformed-claim tests.
    production_action_required: true
    approval_gate: GATE-08
    rollback: Fall back to a short bounded TTL implementation, never an indefinitely stale cache.
    evidence_after:
      - backend/sealai_v2/security/auth.py
      - backend/sealai_v2/tests/test_auth.py
      - backend/sealai_v2/tests/test_auth_hardening_contract.py
    residual_risk: The production backend continues to use its current JWKS behavior until the exact image is deployed under Gate-08 and rotation/outage smoke tests pass.

  - finding_id: RAG-001
    title: Exact-answer cache and knowledge release are not bound to mutable ledger authority
    original_severity: HIGH
    verified_severity: HIGH
    verification_status: CONFIRMED
    production_affected: true
    affected_components: [answer cache, knowledge ledger, Qdrant projection, response metadata]
    root_cause: Cache and release evidence bind code or seed state, not the mutable active-claim authority epoch.
    dependencies: [authority epoch contract, ledger and Qdrant reconciliation, production-faithful release evidence]
    remediation_type: [code, configuration, data_migration, governance]
    implementation_status: IN_PROGRESS
    evidence_before:
      - audit/2026-07-14-vps-deep-audit/12-findings.md#RAG-001
    changes:
      - Added a Postgres-owned mutable authority sequence that is bumped in the same transaction as claim replacement, review-state changes, and retirement.
      - Bound each request and exact-cache namespace to a tenant-specific digest of the sequence plus the currently usable claim IDs, versions, fingerprints, and expiry timestamps.
      - Added a second Postgres authority read immediately before cache publication and response; an in-flight quarantine, revoke, update, or expiry publishes neither.
      - Kept Qdrant strictly derived: retrieval metadata cannot mint authority and every resolved claim remains ledger-revalidated.
    tests:
      - Local lifecycle tests cover quarantine, revoke, claim update, expiry without a scheduler, tenant change, Qdrant rebuild metadata, and in-flight authority change.
      - Pipeline regression proves a changed final epoch prevents both cache publication and response.
    production_action_required: true
    approval_gate: GATE-08
    rollback: Disable the cache; do not make old namespace entries valid after reverting code.
    evidence_after:
      - docs/ops/redis-cache-contract.md
      - backend/sealai_v2/knowledge/authority.py
      - backend/sealai_v2/tests/test_knowledge_authority.py
      - backend/sealai_v2/tests/test_answer_cache_authority.py
      - .ai-remediation/runs/REM-2026-07-14/evidence/README.md#p1-data-authority
    residual_risk: The lifecycle-bound implementation is local only. Production remains unchanged, and final release/evaluation evidence must bind the deployed Postgres state and exact image under GATE-08.

  - finding_id: DATA-001
    title: Legacy ownership and relational integrity are incomplete
    original_severity: HIGH
    verified_severity: HIGH
    verification_status: CONFIRMED
    production_affected: true
    affected_components: [sessions, facts, durable facts, tenant isolation, Postgres schema]
