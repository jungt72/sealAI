  - finding_id: AUTH-003
    title: Admin role conflates tenant administration with global platform-owner authority
    original_severity: HIGH
    verified_severity: HIGH
    verification_status: PARTIALLY_CONFIRMED
    production_affected: true
    affected_components: [JWT role mapping, contribution queue, manufacturer leads, adaptive interview admin]
    root_cause: A single realm role is interpreted as both tenant-local and platform-global authority.
    dependencies: [production role-assignment census, explicit role model, tenant-scoped queries]
    remediation_type: [code, configuration, data_migration, governance]
    implementation_status: BLOCKED_EXTERNAL
    evidence_before:
      - audit/2026-07-14-vps-deep-audit/12-findings.md#AUTH-003
      - Code collision confirmed; current customer-facing admin role assignments remain unverified.
    changes:
      - Replaced the ambiguous application role with pairwise-distinct tenant-admin, platform-owner, system-operator, contributor, manufacturer, capability-reviewer, knowledge-reviewer, knowledge-approver, and decision-reviewer settings.
      - Global business, operational telemetry, tenant decision, manufacturer self-service, and technical-review routes now enforce their dedicated role and reject the legacy literal admin role.
      - Added an exact versioned Keycloak role/group manifest and a narrow reconciler that is read-only by default, never changes user memberships, emits aggregate receipts only, and requires --apply plus approved manifest and membership-bound census hashes for managed-role drift.
      - Removed legacy admin/reviewer provisioning from the broad realm-hardening routine; incompatible group overlap and direct legacy admin assignments block governance apply.
    tests:
      - Settings reject empty, duplicate, or legacy admin role names; endpoint tests cover platform-owner, system-operator, reviewer, approver, manufacturer, and ordinary-user denials.
      - Reconciler tests cover exact paginated role/group inventory, idempotency, legacy mapping removal, direct/group overlap blocking, membership-bound PII-free receipts, offline-apply denial, and separation from realm hardening.
    production_action_required: true
    approval_gate: GATE-06
    rollback: Keep the new role mappings unapplied or restore the prior approved mapping manifest; realm-admin recovery remains owner-specific and separate. Any time-bounded dual-read requires its own reviewed migration window.
    evidence_after:
      - backend/sealai_v2/api/deps.py
      - backend/sealai_v2/config/settings.py
      - docker-compose.deploy.yml
      - security/keycloak-governance-v1.json
