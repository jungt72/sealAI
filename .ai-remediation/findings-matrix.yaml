  - finding_id: CONT-001
    title: Containers lack consistent limits and least-privilege runtime hardening
    original_severity: MEDIUM
    verified_severity: MEDIUM
    verification_status: CONFIRMED
    production_affected: true
    affected_components: [all sealingAI containers, Qdrant, worker]
    root_cause: Compose service definitions prioritize function without measured CPU, memory, PID, filesystem, and capability profiles.
    dependencies: [load profile, per-service writable path inventory, NET-001]
    remediation_type: [configuration, infrastructure, operational]
    implementation_status: CONFIRMED
    evidence_before:
      - audit/2026-07-14-vps-deep-audit/12-findings.md#CONT-001
    changes:
      - Add service users, capability drops, no-new-privileges, read-only filesystems or tmpfs, and measured resource and PID limits.
    tests:
      - Functional, negative write and capability, and bounded-load tests per service.
    production_action_required: true
    approval_gate: GATE-08
    rollback: Roll back one service hardening option or limit at a time while retaining tested controls on unaffected services.
    evidence_after: []
    residual_risk: A compromised or runaway container retains excess host impact until service profiles are deployed.

