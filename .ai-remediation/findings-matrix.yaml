  - finding_id: NET-001
    title: Production, staging, and unrelated workloads share a flat Docker network
    original_severity: HIGH
    verified_severity: HIGH
    verification_status: CONFIRMED
    production_affected: true
    affected_components: [Docker networks, Qdrant, Postgres, Redis, staging, unrelated containers]
    root_cause: Historical default networking lacks service trust zones, data-service authentication, and least-privilege identities.
    dependencies: [connectivity matrix, per-service credentials, rollback-capable cutover]
    remediation_type: [configuration, infrastructure, operational, credential_rotation]
    implementation_status: IMPLEMENTED_NOT_DEPLOYED
    evidence_before:
      - audit/2026-07-14-vps-deep-audit/12-findings.md#NET-001
    changes:
      - Replaced the implicit production network with deny-by-default edge, frontend, backend, identity, per-consumer Postgres, Qdrant, Redis, document, observability, and isolated egress zones.
      - Removed Paperless and Biz from sealai_default; Paperless is project-local and Strapi receives only one runtime-internal scoped Postgres bridge.
      - Prepared separate Keycloak and V2 Postgres roles plus mandatory Qdrant API-key authentication without creating or rotating production credentials.
