  - finding_id: CONT-001
    title: Containers lack consistent limits and least-privilege runtime hardening
    original_severity: MEDIUM
    verified_severity: MEDIUM
    verification_status: CONFIRMED
    production_affected: true
    affected_components: [all sealingAI containers, Qdrant, worker]
    root_cause: Compose service definitions prioritize function without measured CPU, memory, PID, filesystem, and capability profiles.
    dependencies: [load profile, per-service writable path inventory, NET-001]
    remediation_type: [configuration, infrastructure, operational]
    implementation_status: IMPLEMENTED_NOT_DEPLOYED
    evidence_before:
      - audit/2026-07-14-vps-deep-audit/12-findings.md#CONT-001
    changes:
      - Added no-new-privileges, cap_drop ALL with narrowly documented startup exceptions, read-only root filesystems, explicit tmpfs or volume write paths, and non-root identities where the repository-owned images prove the UID.
      - Added required per-service PID, CPU, and memory inputs with no guessed defaults plus bounded local log rotation and immutable production image refs.
      - Preserved the development stack by placing all production hardening in the deployment overlay.
    tests:
      - Static hardening contract and rendered Compose guard tests reject missing limits, write controls, capability drops, mutable images, and unbounded logging.
      - Runtime negative-write, effective-capability, restart, health, and bounded-load tests remain mandatory per selected digest at GATE-08.
    production_action_required: true
    approval_gate: GATE-08
    rollback: Roll back one service hardening option or limit at a time while retaining tested controls on unaffected services.
    evidence_after:
      - docker-compose.deploy.yml
      - ops/compose_security_guard.py
      - docs/ops/gate-05-network-cutover.md#container-härtung-kompatibilitätsvertrag
      - backend/tests/test_network_security_contract.py
    residual_risk: A compromised or runaway production container retains the current host impact until exact image UID and writable-path compatibility, measured limits, and controlled recreation pass GATE-08; foreign image healthchecks also remain runtime evidence.

  - finding_id: NET-002
    title: Additional wildcard listeners are unguarded and effective firewall policy is unverified
    original_severity: MEDIUM
    verified_severity: MEDIUM
    verification_status: CONFIRMED
    production_affected: true
    affected_components: [ports 3002, 3003, 3100, 8443, listener guard, UFW, nftables]
    root_cause: Shared-host listeners drift outside a broken blocklist-style guard and privileged firewall state was not available to the audit.
    dependencies: [privileged rules inventory, out-of-band SSH recovery, NET-001]
    remediation_type: [code, configuration, infrastructure, operational]
    implementation_status: IMPLEMENTED_NOT_DEPLOYED
    evidence_before:
      - audit/2026-07-14-vps-deep-audit/12-findings.md#NET-002
    changes:
      - Added a fail-closed listener allowlist observer with a fixed ss command, five-second timeout, no process arguments, and no enforcement mode.
      - Added hardened observation-only systemd service and timer artifacts; installation and activation remain GATE-05 mutations.
      - Added a timeout-safe firewall cutover and rollback plan requiring OOB recovery, two SSH sessions, root-only rule backups, nft syntax checks, an armed five-minute automatic restore, and external IPv4/IPv6 probes.
    tests:
      - Synthetic allowed listeners plus unexpected 3002, 3003, 3100, and 8443 wildcard listeners, explicit non-loopback bind, malformed ss input, and observation-only contract tests.
      - External authorized and denied connectivity remains mandatory production evidence under GATE-05.
    production_action_required: true
    approval_gate: GATE-05
    rollback: Use out-of-band SSH and an automatic timeout rollback for firewall changes; start the guard in alert-only mode.
    evidence_after:
      - ops/listener_allowlist.json
      - ops/network_listener_guard.py
      - ops/systemd/sealai-listener-guard.service
      - ops/systemd/sealai-listener-guard.timer
      - docs/ops/gate-05-network-cutover.md#firewall-mit-automatischem-timeout-rollback-gate-05
      - backend/tests/test_network_security_contract.py
    residual_risk: Direct exposure cannot be excluded until effective UFW, nftables, and Docker rule paths are verified.

