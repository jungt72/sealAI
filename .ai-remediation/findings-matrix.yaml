      - audit/2026-07-14-vps-deep-audit/12-findings.md#OBS-001
    changes:
      - Added locally tested Redis capacity, TTL coverage, key ownership, queue depth, eviction, write-error, and state-continuity observations with bounded local alert handoff.
      - Replaced retired V1 scrapes and dashboards with a renderable isolated V2 graph for API, worker, Keycloak, host, containers, Postgres, Redis, Qdrant, recovery, TLS, auth, quota, and provider-cost contracts.
      - Added 58 fail-closed recording/alert rules, including explicit absent and up=0 behavior, per-queue and per-DR-component completeness, file-backed Qdrant auth, and bounded retention.
