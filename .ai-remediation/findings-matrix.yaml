    root_cause: Candidate validation is coupled to production identities and networks before final eligibility is established.
    dependencies: [REL-001, NET-001, scoped test credentials]
    remediation_type: [code, configuration, infrastructure, operational]
    implementation_status: IMPLEMENTED_NOT_DEPLOYED
    evidence_before:
