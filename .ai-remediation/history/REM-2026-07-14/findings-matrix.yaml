    title: Additional wildcard listeners are unguarded and effective firewall policy is unverified
    original_severity: MEDIUM
    verified_severity: MEDIUM
    verification_status: CONFIRMED
    production_affected: true
    affected_components: [ports 3002, 3003, 3100, 8443, listener guard, UFW, nftables]
    root_cause: Shared-host listeners drift outside a broken blocklist-style guard and privileged firewall state was not available to the audit.
    dependencies: [privileged rules inventory, out-of-band SSH recovery, NET-001]
    remediation_type: [code, configuration, infrastructure, operational]
    implementation_status: CONFIRMED
    evidence_before:
      - audit/2026-07-14-vps-deep-audit/12-findings.md#NET-002
    changes:
