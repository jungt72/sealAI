  - finding_id: AUTH-004
    title: OIDC state is not validated and authentication or case identifiers use query strings
    original_severity: MEDIUM
    verified_severity: MEDIUM
    verification_status: CONFIRMED
    production_affected: true
    affected_components: [dashboard OIDC, Nginx access logs, Keycloak logout, case routing]
    root_cause: A minimal in-memory OIDC client omits durable one-time state correlation and URI logging lacks sensitive-route policy.
    dependencies: [compatible login flow, log redaction, APP-001]
    remediation_type: [code, configuration, governance]
    implementation_status: CONFIRMED
    evidence_before:
      - audit/2026-07-14-vps-deep-audit/12-findings.md#AUTH-004
    changes:
      - Validate one-time short-lived state and nonce, immediately scrub callback URLs, and remove or mask sensitive query arguments.
    tests:
      - Missing, mismatched, and replayed state denial plus token, code, and case-ID log-redaction tests.
    production_action_required: true
    approval_gate: GATE-06
    rollback: Preserve query redaction; retain a compatible stateful login implementation during staged rollout.
    evidence_after: []
