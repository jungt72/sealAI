  - finding_id: DR-001
    title: Backups share the production failure domain and complete restore is unproven
    original_severity: HIGH
    verified_severity: HIGH
    verification_status: CONFIRMED
    production_affected: true
    affected_components: [Postgres, Qdrant, Redis, uploads, configuration, disaster recovery]
    root_cause: Backups were designed for local corruption recovery rather than encrypted offsite disaster recovery and full-host reconstruction.
    dependencies: [external object storage access, immutable manifest, OPS-001, REL-002]
    remediation_type: [configuration, infrastructure, operational, governance]
    implementation_status: IMPLEMENTED_NOT_DEPLOYED
    evidence_before:
      - audit/2026-07-14-vps-deep-audit/12-findings.md#DR-001
    changes:
      - Added fail-closed target and capacity binding, no-clobber publication, checksums, fixed command timeouts, lifecycle locks, and safe local retention for Postgres and Qdrant backups.
      - Added a provider-neutral encrypted-offsite receipt contract binding local plaintext, downloaded ciphertext, decrypted plaintext, object identity, and versioned key identity.
      - Hardened Qdrant snapshot deletion and restore to preserve the verified local inode, wait for completion, and validate the exact success response.
    tests:
      - Capacity stop conditions, descriptor and inode binding, poisoned environment and shell functions, no-clobber publication, retention, checksum, offsite receipt, Qdrant deletion, and restore-response tests.
      - Empty-host offsite restore covering Redis, uploads, auth, configuration, and artifact digests remains pending P2 and external infrastructure.
    production_action_required: true
    approval_gate: GATE-08
    rollback: Add offsite copies without reducing local retention until two successful restore drills.
    evidence_after:
      - docs/runbooks/backup-storage-safety.md
      - ops/RESTORE.md
      - Local backup safety tests passed; no production backup, deletion, offsite transfer, or restore was executed.
    residual_risk: Host or volume loss can destroy production and all local recovery material until external storage is configured and tested.

