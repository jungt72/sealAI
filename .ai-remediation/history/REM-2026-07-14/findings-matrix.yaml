    tests:
      - Synthetic unexpected listener alert and externally authorized connectivity matrix.
    production_action_required: true
    approval_gate: GATE-05
    rollback: Use out-of-band SSH and an automatic timeout rollback for firewall changes; start the guard in alert-only mode.
