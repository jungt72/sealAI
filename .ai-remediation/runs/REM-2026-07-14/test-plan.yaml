schema_version: 1
run_id: REM-2026-07-14
global_preconditions:
  - no production credentials or production data in tests
  - isolated local services only
  - secret scan runs before and after generated artifacts
suites:
  p0-secret-hygiene:
    - synthetic positive patterns for PEM, JWK, JWT, Bearer, API keys, connection strings, env files, dumps, and backups
    - safe placeholder negative fixtures
    - filename and content traversal including Markdown and extensionless files
    - tracked-tree and history modes
    - report and log redaction assertions
    - CI workflow fail-closed behavior
  p0-storage-safety:
    - threshold boundary tests at 74, 75, 84, and 85 percent
    - dry-run and lock contention tests
    - active volume and unverified backup protection
    - build, pull, backup, and release preflight denial at critical space
    - structured event and alert contract tests
  p0-redis-stability:
    - no Redis, Celery, or Kombu dependency or import in V2
    - no Redis credential or dependency in V2 Compose services
    - V2 API and outbox worker function when Redis is absent
    - read-only memory thresholds, write-error counters, namespace redaction, and unknown-category denial
    - non-rebuildable queue and checkpoint protection plus metrics and alerts
    - pre-auth Unix-socket inode and peer-credential binding with zero credential bytes on failure
    - exact maxmemory-policy, config fingerprint, two-sample continuity, and cumulative RESP budgets
    - two-pass Gate-04 observation with duplicate-input, evidence-expiry, container-drift, no-write, and no-mutation denial
    - full V2 regression suite plus independent adversarial re-review
  p1-data-authority:
    - transactionally bumped Postgres authority and tenant-specific digest changes after quarantine, revoke, expiry, claim update, and tenant switch
    - request-bound final authority recheck rejects an in-flight change before cache publication or response
    - Qdrant payload, sync metadata, and rebuild state cannot mint or extend authority; ledger revalidation remains mandatory
    - exact-answer cache authority namespace, TTL, tenant/global cardinality, and no-publication regression
    - additive Alembic 0012/0013 upgrade with no data rewrite, constraint validation, RLS, or FORCE activation
    - ownerless, quarantined, cross-owner, cross-tenant, orphan-child, durable-memory, curated-memory, purge, and RFQ-lead fail-closed tests
    - explicit case ID and revision across multiple cases, parallel Briefing/RFQ requests, stale snapshots, IDOR, missing/deleted case, injection, and no-turn-mutation
    - role matrix for tenant admin, platform owner, system operator, contributor, manufacturer, capability reviewer, knowledge reviewer, knowledge approver, and decision reviewer
    - two-person knowledge review including same-actor, skipped-review, metadata-mutation, non-human, and incomplete-evidence denials
    - opt-in real PostgreSQL role and FORCE-RLS proof only with explicit test DSN and nonproduction guard
  regression:
    - backend lint and focused tests
    - frontend lint, typecheck, and focused tests when touched
    - compose configuration validation
    - repository-wide secret scan
production_verification:
  status: NOT_AUTHORIZED
  requires_gate: GATE-08
