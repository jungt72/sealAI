schema_version: 1
run_id: REM-2026-07-14
global_rules:
  - do not restore revoked or rotated credentials
  - do not reintroduce credential material into Git
  - do not delete data without an object-specific verified recovery source
  - do not roll back to an untested release gate
  - stop if rollback is not executable
packages:
  p0-secret-hygiene:
    reversible:
      - scanner, hooks, CI, examples, and documentation can be reverted by commit
    irreversible:
      - credential revocation and rotation must remain in force
    recovery:
      - restore service configuration only with replacement credentials from the approved runtime secret path
  p0-storage-safety:
    reversible:
      - guard code, unit definitions, thresholds, and alert routing can be reverted as scoped files
    irreversible:
      - volume expansion is not normally reversed
      - approved deletion is restored only from the named verified backup or immutable artifact
  p0-redis-stability:
    reversible:
      - V2 Redis-independence wiring, disabled cache contract, read-only guard, and observation tooling are independently revertible before deployment
    recovery:
      - exact-answer cache remains hard-disabled; do not make any old namespace valid during rollback
      - non-rebuildable state requires verified persistence and restore evidence before any separately implemented mutation
      - a guard rollback must preserve noeviction and must not authorize legacy-key cleanup
  p1-data-authority:
    reversible:
      - application authority, role gates, case-artifact contracts, and disabled-by-default cache behavior can be reverted only to another fail-closed tested commit
      - nullable migration columns and NOT VALID constraints may remain during an application rollback because old code does not depend on their removal
    recovery:
      - disable exact-answer cache before reverting authority code; never make an old epoch namespace valid again
      - roll backend and frontend case-artifact contracts together; stale or mixed clients must remain rejected
      - never remove quarantine markers, assign an owner, validate a constraint, or disable RLS/FORCE outside the separately authorized GATE-07 rollback commands
      - restore ownership or integrity data only from the named immutable backup and dual-reviewed mapping evidence
  production_deployment:
    recovery:
      - re-promote the previously attested backend digest and dashboard artifact
      - restore the versioned configuration manifest
      - verify auth, health, data counts, and retrieval before reopening traffic
