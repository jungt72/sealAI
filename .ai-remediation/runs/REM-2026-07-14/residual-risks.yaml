schema_version: 1
run_id: REM-2026-07-14
status: OPEN
risks:
  - risk_id: RISK-P0-SECRETS
    severity: CRITICAL
    summary: Tracked credentials remain present in production history and require human-controlled rotation and later history remediation.
    blocked_by: [GATE-01, GATE-09]
  - risk_id: RISK-P0-PERMISSIONS
    severity: CRITICAL
    summary: Production secret-adjacent files remain permissively readable until the object-specific permission plan is approved.
    blocked_by: [GATE-02]
  - risk_id: RISK-P0-STORAGE
    severity: CRITICAL
    summary: Local non-destructive guards, release interlocks, backup safety, and exact-object cleanup controls are implemented and tested, but production data storage remains at 95 percent because none of them has been deployed or executed.
    blocked_by: [GATE-03, GATE-08]
  - risk_id: RISK-P0-REDIS
    severity: HIGH
    summary: Local V2 independence, a fail-closed read-only capacity guard, and a non-executable two-pass legacy inventory observer are implemented and independently reviewed. Production nevertheless remains near maxmemory with noeviction and only two expiring keys; no guard is installed and no cleanup execution path exists.
    blocked_by: [exact collision-free key selection, verified Redis recovery evidence, external alert receiver, GATE-04, GATE-08]
  - risk_id: RISK-P0-REDIS-CACHE-AUTHORITY
    severity: HIGH
    summary: A lifecycle-bound Postgres authority epoch and final request recheck are implemented and tested locally, but production still runs the audited code and no exact-image release evidence binds the deployed ledger state.
    blocked_by: [production-faithful replay, exact-image release evidence, GATE-08]
  - risk_id: RISK-PARALLEL-DEPLOYMENT
    severity: HIGH
    summary: Production advanced independently from the initial audited commit to 6e5608c3 while remediation was active; it is healthy and clean, but the locally tested release freeze is not deployed and therefore did not govern that event.
    blocked_by: [GATE-08, GATE-10]
  - risk_id: RISK-DR-OFFSITE
    severity: HIGH
    summary: Local immutable manifest-v2 recovery sets, provider-neutral encrypted transport, fail-closed local-only evidence, retention planning, RPO/RTO, and monitoring contracts are implemented and tested. Local evidence can never become OFFSITE_VERIFIED or RESTORE_VERIFIED; no external repository, cryptographic receipt trust root/importer, managed key lifecycle, dedicated runner, real full restore, or canonical Postgres-to-Qdrant rebuild is available yet.
    blocked_by: [external alert receiver, external encrypted object storage, offline key custody, dedicated recovery runner, Gate-08-approved cryptographic receipt trust root and independent attestor/importer, two isolated restore drills, P1-D Qdrant rebuild command, GATE-08]
  - risk_id: RISK-P1-RELEASE
    severity: HIGH
    summary: The final gate does not yet prove the exact production retrieval path and immutable artifacts.
    blocked_by: [GATE-08, GATE-10]
  - risk_id: RISK-P1-AUTH-DATA-NETWORK
    severity: HIGH
    summary: Local role separation and ownership guards do not change production Keycloak assignments, legacy data, database roles, or network segmentation.
    blocked_by: [GATE-05, GATE-06, GATE-07, GATE-08]
  - risk_id: RISK-P1-DATA-RLS
    severity: HIGH
    summary: A fixed-role, transaction-scoped role/GUC adapter and separate API/worker credential paths are implemented and unit-tested locally, but not deployed or exercised against an explicitly supplied ephemeral PostgreSQL engine. Legacy ownership counts/mappings, restore evidence, productive credentials, constraint validation, and FORCE RLS remain absent; no prepared production script was executed.
    blocked_by: [aggregate production profile, immutable restore proof, dual-reviewed ownership mapping, opt-in PostgreSQL proof, role and credential provisioning, GATE-07, GATE-08]
  - risk_id: RISK-P1-CASE-ARTIFACT-DEPLOYMENT
    severity: HIGH
    summary: Exact read-only Briefing/RFQ contracts pass locally, but production remains vulnerable until backend and frontend are promoted together and stale clients are rejected.
    blocked_by: [exact-image verification, frontend/backend coordinated deployment, GATE-08]
  - risk_id: RISK-P1-REVIEW-AFFILIATION
    severity: HIGH
    summary: Two-person subject and role separation is local, while authoritative organization affiliations and shared-affiliation conflict checks remain unavailable; review features must stay disabled.
    blocked_by: [identity affiliation authority, sanitized production role census, GATE-07]
  - risk_id: RISK-P1-API-LIFECYCLE
    severity: HIGH
    summary: API-001 hard limits, shared admission, bounded pagination, strict governance records, quarantine, and lifecycle receipts are implemented and tested locally but default-off and undeployed. Legal/privacy authority, retention duration, receipt-key lifecycle, quota capacity, legacy disposition, real PostgreSQL/RLS evidence, migration validation, and exact-image deployment are unproven; production remains in the audited state.
    blocked_by: [human policy/purpose/consent authority, retention decision, receipt-key custody and rotation, quota capacity approval, production role/privacy census, immutable restore proof, aggregate legacy profile, explicit ephemeral PostgreSQL proof, GATE-06, GATE-07, GATE-08]
accepted_risks: []
