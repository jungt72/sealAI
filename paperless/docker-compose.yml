services:
  gotenberg:
    container_name: gotenberg
    image: gotenberg/gotenberg:8.15.0
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-allow-list=file:///tmp/.*"
    networks:
      - sealai_default

  tika:
    container_name: tika
    image: apache/tika:2.9.2.1
    restart: unless-stopped
    networks:
      - sealai_default

  paperless:
    container_name: paperless
    image: ghcr.io/paperless-ngx/paperless-ngx:2.20.10
    restart: unless-stopped
    depends_on:
      - gotenberg
      - tika
    env_file:
      - docker-compose.env
    volumes:
      - ./data:/usr/src/paperless/data
      - ./media:/usr/src/paperless/media
      - ./export:/usr/src/paperless/export
      - ./consume:/usr/src/paperless/consume
    networks:
      - sealai_default

networks:
  sealai_default:
    external: true
