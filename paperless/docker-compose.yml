services:
  gotenberg:
    image: ${PAPERLESS_GOTENBERG_IMAGE:?PAPERLESS_GOTENBERG_IMAGE required - set an approved tag@sha256 digest}
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-allow-list=file:///tmp/.*"
    networks:
      - paperless_internal

  tika:
    image: ${PAPERLESS_TIKA_IMAGE:?PAPERLESS_TIKA_IMAGE required - set an approved tag@sha256 digest}
    restart: unless-stopped
    networks:
      - paperless_internal

  paperless:
    image: ${PAPERLESS_IMAGE:?PAPERLESS_IMAGE required - set an approved tag@sha256 digest}
    restart: unless-stopped
    depends_on:
      - gotenberg
      - tika
    env_file:
      - docker-compose.env
    volumes:
      - ./data:/usr/src/paperless/data
      - ./media:/usr/src/paperless/media
      - ./export:/usr/src/paperless/export
      - ./consume:/usr/src/paperless/consume
      - ./scripts:/usr/src/paperless/scripts:ro
    networks:
      - paperless_internal

networks:
  paperless_internal: {}
