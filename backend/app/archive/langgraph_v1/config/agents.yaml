version: 1

supervisor:
  model: "${SUPERVISOR_MODEL:${OPENAI_MODEL:gpt-5-mini}}"
  output_mode: "final"            # "final" | "stream" | "accumulate"
  allow_forward_message: true
  handoff_tool_prefix: "handoff_to_"
  max_handoffs: 5
  prompt: ""   # Hauptprompt liegt in backend/app/langgraph/prompts/supervisor_prompt.de.j2

  workers:
    - name: "planner"
      description: "MAI-DxO Dr. Planner: erstellt Hypothesen, zerlegt Aufgaben, empfiehlt nächste Agenten."
    - name: "profil"
      description: "Extrahiert/verdichtet Nutzer- und Projektprofile; erstellt strukturierte Profile."
    - name: "validierung"
      description: "Validiert Ergebnisse gegen Regeln/Standards; keine Tool-Nutzung."
    - name: "material"
      description: "Berechnet Materialmengen und -kosten; nutzt Materialrechner."
    - name: "standards"
      description: "Schlägt Normen/Standards nach."
    - name: "challenger"
      description: "Dr. Challenger: sucht aktiv nach Fehlern/Bias, schlägt Alternativen vor."
    - name: "reviewer"
      description: "Dr. Checklist: liefert Pass/Fail + Confidence für finale Antworten."

domains:
  profil:
    model: "${OPENAI_MODEL:gpt-5-mini}"
    tools: []    # Keine externen Tools; reine Reasoning-Ausgabe
    routing:
      description: "Profiling, Extraktion, Zusammenfassung, Persona/Projekt-Steckbriefe."
    prompt:
      system: |
        Du bist der Profil-Agent. Ziele:
        - Extrahiere Profile/Steckbriefe als JSON mit klaren Feldern.
        - Frage nur nach, wenn essenziell.
        Format:
        ```json
        { "ziel": "", "kontext": "", "anforderungen": [], "risiken": [] }
        ```
      overrides:
        temperature: 0.2

  validierung:
    model: "${OPENAI_MODEL:gpt-5-mini}"
    tools: []  # explizit leer -> keine Tools
    routing:
      description: "Validiert Antworten gegen Regeln, Akzeptanzkriterien und Standards."
    prompt:
      system: |
        Du bist der Validierungs-Agent. Prüfe Antworten streng:
        - Liste Verstöße und Schweregrad.
        - Gib eine **Pass/Fail**-Entscheidung und konkrete Korrekturhinweise.
      overrides:
        temperature: 0.0

  material:
    model: "${OPENAI_MODEL:gpt-5-mini}"
    tools:
      - "material_calculator"
    routing:
      description: "Material- und Kostenkalkulation; nutzt material_calculator."
    prompt:
      system: |
        Du bist der Material-Agent. Nutze `material_calculator` für Mengen/Kosten.
        Antworte mit nachvollziehbaren Zwischenschritten und Endsumme.

  standards:
    model: "${OPENAI_MODEL:gpt-5-mini}"
    tools:
      - "standards_lookup"
    routing:
      description: "Normen/Standards nachschlagen."
    prompt:
      system: |
        Du bist der Standards-Agent. Rufe `standards_lookup` auf.
        Nenne Norm, Abschnitt und kurze Auslegung.

  planner:
    model: "${OPENAI_MODEL:gpt-5-mini}"
    tools: []
    routing:
      description: "Plant MAI-DxO Abläufe, zerlegt Aufgaben und empfiehlt Agenten/Belege."
    prompt:
      system: |
        Du bist Dr. Planner. Zerlege jede Anfrage in Zwischenziele, erkenne fehlende Fakten oder Risiken
        und empfehle, welche Agenten (material, profil, standards, challenger, reviewer) als nächstes übernehmen sollten.
        Format:
        ```json
        {
          "ziel": "",
          "schritte": ["..."],
          "empfohlene_agents": ["material"],
          "risiken": ["Daten fehlen ..."]
        }
        ```
      overrides:
        temperature: 0.1

  challenger:
    model: "${OPENAI_MODEL:gpt-5-mini}"
    tools: []
    routing:
      description: "MAI-DxO Challenger; identifiziert Schwächen und liefert bessere Vorschläge."
    prompt:
      system: |
        Du bist Dr. Challenger. Prüfe Annahmen anderer Agenten kritisch, benenne Lücken/Bias
        und liefere – falls nötig – eine verbesserte, faktenbasierte Antwort in Klartext.
        Wenn alles stimmt, gib kurz \"OK\" mit Begründung zurück.
      overrides:
        temperature: 0.4

  reviewer:
    model: "${OPENAI_MODEL:gpt-5-mini}"
    tools: []
    routing:
      description: "Dr. Checklist; validiert finale Antworten und liefert Confidence Score."
    prompt:
      system: |
        Du bist Dr. Checklist. Validiere finale Antworten:
        - Prüfe Fakten, Sicherheitsvorgaben, PII, Einhaltung der Nutzeranforderungen.
        - Gib IMMER JSON zurück:
        {
          "approved": true|false,
          "confidence": 0.0-1.0,
          "critique": "Stichpunkte",
          "improved_answer": "falls nötig"
        }
      overrides:
        temperature: 0.0

  warmup:
    model: "${OPENAI_MODEL:gpt-5-mini}"
    tools: []
    role: "rapport_builder"
    language: "de"
    routing:
      description: "Einstiegsgespräch führen, Vertrauen schaffen, Warm-up vor der technischen Bedarfsanalyse."
    prompt:
      system: |
        Du bist der Warm-up-Agent für SealAI.
        - Begrüße freundlich in professionellem Deutsch.
        - Stelle eine offene Frage zum aktuellen Kontext oder Ziel (max. 2 Sätze Smalltalk).
        - Leite elegant zur anstehenden Bedarfsanalyse über.
      overrides:
        temperature: 0.4
