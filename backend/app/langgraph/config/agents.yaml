# MIGRATION: Phase-1/Phase-2 - Agent-/Subgraph-Konfigurationen
material:
  model:
    name: gpt-4o-mini  # Overridden by OPENAI_MODEL if set
    temperature: 0.7
    max_output_tokens: 1000
  prompt:
    variant: default
  rag:
    index_id: sealai-docs
    top_k: 6
    hybrid: true
    filters: {"domain": "material"}
    cache_ttl_seconds: 3600
  tools:
    list: [material_calculator]
    timeout_ms: 30000
    concurrency: 2
    circuit_breaker: true
    retry: {"max_tries": 3, "backoff_ms": 1000}
  limits:
    latency_ms: 5000
    rounds: 5
    tokens_out: 2000
  budget:
    max_tool_calls: 10
    max_llm_calls: 5
# Similar for profil, validierung
debate:
  model:
    name: gpt-4o  # Overridden by OPENAI_MODEL if set
    temperature: 0.3
  prompt:
    initiator: prompts/debate/initiator.md
    pro_agent: prompts/debate/pro_agent.md
    contra_agent: prompts/debate/contra_agent.md
    moderator: prompts/debate/moderator.md
    judge: prompts/debate/judge.md
  limits:
    rounds: 3
    latency_ms: 10000
