[pytest]
addopts = -q --ignore=app/archive --ignore=app/langgraph
asyncio_mode = auto
cache_dir = /tmp/pytest_cache
testpaths =
    app/api/tests
    app/langgraph_v2/tests
    app/services
markers =
    asyncio: mark a test as asyncio
pythonpath =
    .
    app
    langchain_core_stub
norecursedirs =
    archive
    langgraph
    __pycache__
    .git
    .venv
    venv
    node_modules
    dist
    build
