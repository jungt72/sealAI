[pytest]
# V2-only: run maintained tests only
testpaths =
    app/api/tests
    app/api/v1/tests
    app/services
    app/langgraph_v2/tests
    tests

# Prevent collecting legacy v1 and archives
norecursedirs =
    app/langgraph
    app/archive
    backend/app/langgraph
    backend/app/archive
    archive
    .git
    .venv
    node_modules

# Your repo layout inside the container uses /app as project root
pythonpath =
    backend
    langchain_core_stub

addopts = -q
