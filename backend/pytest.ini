[pytest]
addopts = -q --ignore=app/archive --ignore=app/langgraph
asyncio_mode = auto
testpaths =
    app/api/tests
    app/langgraph_v2/tests
    app/services/chat/tests
pythonpath =
    .
    langchain_core_stub
norecursedirs =
    archive
    langgraph
    __pycache__
    .git
    .venv
    venv
    node_modules
    dist
    build
