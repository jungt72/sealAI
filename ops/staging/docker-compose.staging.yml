# ops/staging/docker-compose.staging.yml — Phase 2 staging validation stack (runbook §Phase 2).
#
# Validates the EXACT prod artifacts: the generated conf is a byte-copy of nginx/default.conf with
# the include applied by ops/v2-flip.sh (run ./ops/staging/gen-staging-conf.sh first); the SPA is
# the same frontend-v2/dist the prod nginx will mount. nginx-staging dual-homes onto the live
# sealai_default network so the shared conf's literal upstreams (sealai-frontend, sealai-backend,
# sealai-keycloak, …) resolve at startup. backend-v2-staging carries the sealai-backend-v2 alias
# ONLY on the staging net — prod nginx can never resolve it (isolation by construction); its
# alias-free sealai_default attachment exists solely to reach sealai-keycloak for JWKS.
#
#   ./ops/staging/gen-staging-conf.sh
#   docker compose --env-file .env.prod -f ops/staging/docker-compose.staging.yml --profile v2 up -d --build
#   BASE_URL=https://sealingai.com:8443 ./ops/smoke-v2.sh
#   docker compose --env-file .env.prod -f ops/staging/docker-compose.staging.yml --profile v2 down   # teardown after Phase 2
name: sealai-staging
services:
  nginx-staging:
    image: nginx:1.29.4
    container_name: nginx-staging
    restart: unless-stopped
    ports:
    - 8443:443    # public during the validation window only (owner option: firewall to owner IP)
    volumes:
    - ./conf/default.conf:/etc/nginx/conf.d/default.conf:ro
    - ./conf/snippets:/etc/nginx/snippets:ro
    - ../../nginx/00-tuning.conf:/etc/nginx/conf.d/00-tuning.conf:ro
    - ../../frontend-v2/dist:/usr/share/nginx/v2-client:ro
    - ../../nginx/www:/var/www/certbot:ro
    - /etc/letsencrypt:/etc/letsencrypt:ro
    - ../../nginx/certs/config:/etc/letsencrypt-analytics:ro
    healthcheck:
      test:
      - CMD-SHELL
      - test -s /var/run/nginx.pid || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
    - staging
    - sealai_default
  backend-v2-staging:
    container_name: backend-v2-staging
    profiles:
    - v2          # mirrors prod placement — rollback dry-run leg 3 (orphan probe) depends on this
    build:
      context: ../../backend
      dockerfile: Dockerfile.v2
    user: 10001:10001
    restart: unless-stopped
    environment:
      APP_ENV: staging
      PYTHONUNBUFFERED: '1'
      SEALAI_V2_AUTH_JWKS_URL: http://sealai-keycloak:8080/realms/sealAI/protocol/openid-connect/certs
      SEALAI_V2_AUTH_ISSUER: https://sealingai.com/realms/sealAI
      SEALAI_V2_AUTH_AUDIENCE: sealai-v2
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY required — pass via docker compose --env-file}
    # NO host port publish: this host's firewall drops host→container traffic on newly created
    # bridges (verified 2026-06-10: 172.18.x sealai_default reachable, fresh staging bridge not),
    # and docker-proxy targets the staging-net IP. Diagnose via
    # `docker exec backend-v2-staging curl -fsS http://127.0.0.1:8001/health` instead. Prod is
    # unaffected — prod backend-v2 sits on sealai_default only, where 127.0.0.1 publishes work.
    networks:
      staging:
        aliases:
        - sealai-backend-v2
      sealai_default: {}
networks:
  staging: {}
  sealai_default:
    external: true
