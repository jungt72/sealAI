# ops/staging/docker-compose.staging.yml — Phase 2 staging validation stack (runbook §Phase 2).
#
# Validates the EXACT prod artifacts: the generated conf is a byte-copy of nginx/default.conf with
# the include applied by ops/v2-flip.sh (run ./ops/staging/gen-staging-conf.sh first); the SPA is
# the isolated frontend-v2/.build/dashboard-candidate output. Production's live
# frontend-v2/dist bind mount is never a normal build target. nginx-staging dual-homes onto the live
# sealai_default network so the shared conf's literal upstreams (sealai-frontend, sealai-backend,
# sealai-keycloak, …) resolve at startup. backend-v2-staging carries the sealai-backend-v2 alias
# ONLY on the staging net — prod nginx can never resolve it (isolation by construction); its
# alias-free sealai_default attachment exists solely to reach sealai-keycloak for JWKS.
#
#   ./ops/staging/gen-staging-conf.sh
#   ./ops/staging/up-staging-v2.sh   # release gate (build) + installed global storage lease
#   BASE_URL=https://sealingai.com:8443 ./ops/smoke-v2.sh
#   docker compose --env-file .env.prod -f ops/staging/docker-compose.staging.yml --profile v2 down   # teardown after Phase 2
name: sealai-staging
services:
  nginx-staging:
    image: nginx:1.29.4
    container_name: nginx-staging
    restart: unless-stopped
    ports:
    - 8443:443    # public during the validation window only (owner option: firewall to owner IP)
    volumes:
    - ./conf/default.conf:/etc/nginx/conf.d/default.conf:ro
    - ./conf/snippets:/etc/nginx/snippets:ro
    - ../../nginx/00-tuning.conf:/etc/nginx/conf.d/00-tuning.conf:ro
    - ../../frontend-v2/.build/dashboard-candidate:/usr/share/nginx/v2-client:ro
    - ../../nginx/www:/var/www/certbot:ro
    - /etc/letsencrypt:/etc/letsencrypt:ro
    - ../../nginx/certs/config:/etc/letsencrypt-analytics:ro
    healthcheck:
      test:
      - CMD-SHELL
      - test -s /var/run/nginx.pid || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
    - staging
    - sealai_default
  backend-v2-staging:
    container_name: backend-v2-staging
    profiles:
    - v2          # mirrors prod placement — rollback dry-run leg 3 (orphan probe) depends on this
    build:
      context: ../../backend
      dockerfile: Dockerfile.v2
    user: 10001:10001
    restart: unless-stopped
    environment:
      APP_ENV: staging
      PYTHONUNBUFFERED: '1'
      SEALAI_V2_AUTH_JWKS_URL: http://sealai-keycloak:8080/realms/sealAI/protocol/openid-connect/certs
      SEALAI_V2_AUTH_ISSUER: https://sealingai.com/realms/sealAI
      SEALAI_V2_AUTH_AUDIENCE: sealai-v2
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY required — pass via docker compose --env-file}
      # Knowledge-mode retrieval parity with prod (docker-compose.deploy.yml): without these,
      # every knowledge-route query fails closed with product_mode_unavailable/pilot_not_activated
      # (settings.py's own fail-safe default), so staging could never live-verify a knowledge-
      # answer fix — the exact gap this block closes. Defaults below match settings.py's code
      # defaults (safe/off), same as prod's own passthrough pattern; the real values already come
      # from .env.prod via this file's existing --env-file invocation (ops/staging/up-staging-v2.sh),
      # so staging now reads the SAME live Qdrant collection prod does. Read-only: a chat query
      # never writes to Qdrant. The embed model (fastembed local MiniLM) is not pre-baked into
      # Dockerfile.v2, so the first knowledge query after a fresh build downloads it at runtime.
      SEALAI_V2_KNOWLEDGE_MODE_ENABLED: ${SEALAI_V2_KNOWLEDGE_MODE_ENABLED:-false}
      SEALAI_V2_RETRIEVER_BACKEND: ${SEALAI_V2_RETRIEVER_BACKEND:-in_process}
      SEALAI_V2_QDRANT_URL: ${SEALAI_V2_QDRANT_URL:-http://qdrant:6333}
      SEALAI_V2_QDRANT_COLLECTION: ${SEALAI_V2_QDRANT_COLLECTION:-sealai_v2_knowledge_v1}
      SEALAI_V2_EMBED_PROVIDER: ${SEALAI_V2_EMBED_PROVIDER:-openai}
      SEALAI_V2_EMBED_MODEL: ${SEALAI_V2_EMBED_MODEL:-text-embedding-3-small}
      SEALAI_V2_EMBED_CACHE_DIR: ${SEALAI_V2_EMBED_CACHE_DIR:-}
      # Model/provider parity with prod: without these, every per-role provider/model falls back
      # to settings.py's own code defaults (provider=openai, l1_model=gpt-5.5, ...) instead of the
      # real prod combination (mistral). That mismatch is not just "a different model" -- it broke
      # the very first pipeline stage outright: gpt-5.5's strict structured-output validation
      # rejected the `sealingai_understanding` response schema (missing `intent` in `required`),
      # a combination Mistral's structured-output implementation does not hit. Only vars whose
      # .env.prod value actually differs from settings.py's code default are listed (standard_*
      # and router_* already match the code default, so they're intentionally omitted here, same
      # discipline as the knowledge/retrieval block above). SEALAI_V2_JUDGE_PROVIDER is included
      # only to prevent it silently inheriting the new mistral default via its own None-fallback --
      # the judge role itself is eval-harness-only and never runs on the live chat path.
      # Fallback defaults below are copied 1:1 from docker-compose.deploy.yml's own passthrough
      # lines for these same vars (not re-derived), so staging's no-env-file fallback behavior
      # matches prod's exactly, not just the real .env.prod-sourced values.
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:?MISTRAL_API_KEY required for the V2 Mistral roles}
      SEALAI_V2_PROVIDER: ${SEALAI_V2_PROVIDER:-mistral}
      SEALAI_V2_L1_PROVIDER: ${SEALAI_V2_L1_PROVIDER:-openai}
      SEALAI_V2_L1_MODEL: ${SEALAI_V2_L1_MODEL:-gpt-5.5}
      SEALAI_V2_VERIFIER_PROVIDER: ${SEALAI_V2_VERIFIER_PROVIDER:-mistral}
      SEALAI_V2_VERIFIER_MODEL: ${SEALAI_V2_VERIFIER_MODEL:-mistral-small-2603}
      SEALAI_V2_HELPER_PROVIDER: ${SEALAI_V2_HELPER_PROVIDER:-mistral}
      SEALAI_V2_HELPER_MODEL: ${SEALAI_V2_HELPER_MODEL:-mistral-small-2603}
      SEALAI_V2_JUDGE_PROVIDER: ${SEALAI_V2_JUDGE_PROVIDER:-openai}
    # NO host port publish: this host's firewall drops host→container traffic on newly created
    # bridges (verified 2026-06-10: 172.18.x sealai_default reachable, fresh staging bridge not),
    # and docker-proxy targets the staging-net IP. Diagnose via
    # `docker exec backend-v2-staging curl -fsS http://127.0.0.1:8001/health` instead. Prod is
    # unaffected — prod backend-v2 sits on sealai_default only, where 127.0.0.1 publishes work.
    networks:
      staging:
        aliases:
        - sealai-backend-v2
      sealai_default: {}
networks:
  staging: {}
  sealai_default:
    external: true
