name: Dependency Audit

# Ops hardening (2026-07-03): the security sweep found ZERO dependency vulnerability scanning anywhere
# in CI. Scoped to the three surfaces actually deployed to prod today (backend-v2's exact image pins,
# the dashboard, and the marketing site) — mirrors v2-contracts.yml's "scan what's live" precedent, not
# the retired V1 backend/requirements.txt. Report-only for now (does not fail the build): a first run
# needs a human to triage true-vs-noise findings before this can safely gate merges — flip
# `continue-on-error: false` once that baseline pass has happened.

on:
  push:
  pull_request:
  schedule:
    # Weekly, independent of any push — new CVEs land against unchanged code.
    - cron: "0 6 * * 1"

jobs:
  backend-v2-pip-audit:
    name: backend-v2 (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip-audit against the exact backend-v2 image pins
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r backend/requirements-v2.txt

  frontend-v2-npm-audit:
    name: frontend-v2 / dashboard (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-v2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit (production dependencies)
        continue-on-error: true
        run: npm audit --omit=dev

  frontend-npm-audit:
    name: frontend / marketing (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit (production dependencies)
        continue-on-error: true
        run: npm audit --omit=dev
