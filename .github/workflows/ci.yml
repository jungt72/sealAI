name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: python -m pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Check lint rules
        run: ruff check .

  # ---------------------------------------------------------------------------
  # Stage 2: Tests (depends on lint)
  # ---------------------------------------------------------------------------
  test:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    needs: [lint]
    env:
      LANGGRAPH_USE_FAKE_LLM: "1"
      PYTHONPATH: "backend:langchain_core_stub"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc pkg-config libffi-dev rustc cargo libpq-dev

      - name: Install Python deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        env:
          LANGGRAPH_USE_FAKE_LLM: "1"
          PYTHONPATH: ".:../langchain_core_stub"
        run: |
          pytest -q --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: backend/.pytest_cache/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Stage 3: Docker build smoke-test (depends on test)
  # ---------------------------------------------------------------------------
  build:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build \
            --file backend/Dockerfile \
            --tag sealai-backend:ci-${{ github.sha }} \
            --build-arg GIT_SHA=${{ github.sha }} \
            backend/

      - name: Build frontend image
        run: |
          docker build \
            --file frontend/Dockerfile \
            --tag sealai-frontend:ci-${{ github.sha }} \
            frontend/
