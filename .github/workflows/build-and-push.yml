name: Build Immutable Backend V2 RC

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: "Exact reviewed source commit to build before Gate 10"
        required: true
        type: string

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND_V2: ${{ github.repository_owner }}/sealai-backend-v2

jobs:
  push:
    name: Build, attest and push immutable backend-v2 RC
    runs-on: ubuntu-latest
    steps:
      - name: Validate exact source coordinate
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          WORKFLOW_REF: ${{ github.ref }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "source_sha must be one full SHA-1" >&2
            exit 2
          }
          [[ "$WORKFLOW_REF" == "refs/heads/main" && "$SOURCE_SHA" == "$WORKFLOW_SHA" ]] || {
            echo "the immutable RC must be dispatched on main for its exact HEAD" >&2
            exit 2
          }

      - name: Checkout source at the requested commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}
          persist-credentials: false
          fetch-depth: 1

      - name: Compute served tree hash
        id: source
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        env:
          EXPECTED_SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          [[ "$sha" == "$EXPECTED_SOURCE_SHA" ]] || {
            echo "checkout does not match requested source_sha" >&2
            exit 2
          }
          [[ -z "$(git status --porcelain=v1 --untracked-files=all)" ]] || {
            echo "RC checkout is not clean" >&2
            exit 2
          }
          tree_hash="$(/bin/bash -p ops/tree-hash.sh)"
          test -n "$tree_hash"
          [[ "$GITHUB_RUN_ID" =~ ^[0-9]+$ && "$GITHUB_RUN_ATTEMPT" =~ ^[0-9]+$ ]]
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "rc_tag=rc-${sha}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "tree_hash=$tree_hash" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push backend-v2
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: backend
          file: backend/Dockerfile.v2
          platforms: linux/amd64
          push: true
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=backend-v2
          cache-to: type=gha,mode=max,scope=backend-v2
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND_V2 }}:${{ steps.source.outputs.rc_tag }}
          build-args: |
            GATE_TREE_HASH=${{ steps.source.outputs.tree_hash }}
            SOURCE_GIT_SHA=${{ steps.source.outputs.sha }}
          labels: |
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            io.sealai.served-tree-hash=${{ steps.source.outputs.tree_hash }}

      - name: Extract and validate pushed SPDX SBOM
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_BACKEND_V2}@${IMAGE_DIGEST}"
          docker buildx imagetools inspect "$image" \
            --format '{{ json .SBOM.SPDX }}' > backend-v2.spdx.json
          jq -e \
            '.spdxVersion and .documentNamespace and ((.packages // []) | length > 0)' \
            backend-v2.spdx.json >/dev/null

      - name: Sign build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND_V2 }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Sign SPDX SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND_V2 }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: backend-v2.spdx.json
          push-to-registry: true

      - name: Publish artifact coordinates
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        run: |
          {
            echo "### backend-v2 artifact"
            echo "- commit: \`${{ steps.source.outputs.sha }}\`"
            echo "- tree hash: \`${{ steps.source.outputs.tree_hash }}\`"
            echo "- one-shot RC tag: \`${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND_V2 }}:${{ steps.source.outputs.rc_tag }}\`"
            echo "- image digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- supply chain: BuildKit OCI provenance/SBOM plus GitHub-signed provenance and SPDX SBOM"
            echo "- status: immutable RC only; this build does not lift Gate 10 and cannot deploy"
          } >> "$GITHUB_STEP_SUMMARY"
