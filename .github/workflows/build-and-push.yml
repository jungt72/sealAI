name: Build and Push Backend

# Triggered automatically when CI completes successfully on main.
# Builds and pushes the production backend image to GHCR.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository_owner }}/sealai-backend

jobs:
  push:
    name: Build + Push backend image
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source at CI commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHA:0:8}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_tag=${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_latest=${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.backend_tag }}
            ${{ steps.tags.outputs.backend_latest }}
          build-args: |
            GIT_SHA=${{ steps.tags.outputs.sha }}
