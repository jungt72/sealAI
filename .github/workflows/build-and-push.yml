name: Build and Validate Backend V2

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-and-push.yml"
      - "backend/Dockerfile.v2"
      - "backend/docker-entrypoint-v2.sh"
      - "backend/requirements-v2.txt"
      - "backend/requirements-v2.lock"
      - "backend/sealai_v2/**"
      - "security/**"
      - "ops/check-secret-hygiene.py"
      - "ops/supply_chain_gate.py"
      - "ops/production-release-gate-check.sh"
      - "ops/production_release_gate.py"
      - "ops/production-release-state.json"
      - "ops/tree-hash.sh"
  workflow_dispatch:

# This workflow deliberately cannot publish or mint OIDC credentials. Publication
# remains BLOCKED_EXTERNAL until protected-main/ruleset and environment approval
# evidence can be verified independently of repository-controlled code.
permissions:
  contents: read

env:
  ARTIFACT_NAME: ghcr.io/jungt72/sealai-backend-v2

jobs:
  build-scan-evidence:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout the immutable event commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Verify the protected-main event boundary
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF: ${{ github.ref }}
          EVENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          [[ "$EVENT_REF" == "refs/heads/main" ]]
          [[ "$EVENT_NAME" == "push" || "$EVENT_NAME" == "workflow_dispatch" ]]
          [[ "$(git rev-parse HEAD)" == "$EVENT_SHA" ]]

      - name: Enforce dependency, secret and Python advisory policy
        run: |
          python -m pip install --require-hashes -r security/tools/requirements.lock
          python ops/supply_chain_gate.py verify
          python ops/check-secret-hygiene.py --tree "$GITHUB_SHA"
          report="$RUNNER_TEMP/pip-audit.json"
          audit_rc=0
          pip-audit \
            -r backend/requirements-v2.lock \
            --no-deps \
            --disable-pip \
            --strict \
            --format=json \
            --output="$report" \
            || audit_rc=$?
          [[ "$audit_rc" == 0 || "$audit_rc" == 1 ]]
          test -s "$report"
          python ops/supply_chain_gate.py evaluate-report \
            --scanner pip-audit \
            --scope backend-v2-runtime \
            --report "$report"

      - name: Enforce release freeze before building release-shaped bytes
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        run: |
          set -euo pipefail
          source "$PWD/ops/production-release-gate-check.sh"
          production_release_gate_check \
            "$PWD/ops/production_release_gate.py" build

      - name: Compute and freeze source identity
        id: source
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$GITHUB_SHA" ]]
          [[ -z "$(git status --porcelain=v1 --untracked-files=all)" ]]
          tree_hash="$(/bin/bash -p ops/tree-hash.sh)"
          [[ "$tree_hash" =~ ^[0-9a-f]{40}$ ]]
          echo "tree_hash=$tree_hash" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build immutable OCI archive without registry credentials
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: backend
          file: backend/Dockerfile.v2
          platforms: linux/amd64
          push: false
          provenance: mode=max
          sbom: true
          outputs: type=oci,dest=backend-v2.oci.tar
          build-args: |
            GATE_TREE_HASH=${{ steps.source.outputs.tree_hash }}
            SOURCE_GIT_SHA=${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            io.sealai.served-tree-hash=${{ steps.source.outputs.tree_hash }}

      - name: Materialize exact backend OCI layout for daemon-free scanning
        run: |
          test -s backend-v2.oci.tar
          mkdir backend-v2.oci
          tar -xf backend-v2.oci.tar -C backend-v2.oci
          test -s backend-v2.oci/index.json

      - name: Scan exact OCI archive for vulnerabilities and licenses
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          version: v0.69.3
          scan-type: image
          input: backend-v2.oci
          scanners: vuln,license
          trivy-config: security/trivy.yaml
          format: json
          output: backend-v2.trivy.json
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: "0"

      - name: Create source- and artifact-bound scan predicate
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          test -s backend-v2.oci.tar
          test -s backend-v2.trivy.json
          python ops/supply_chain_gate.py create-scan-predicate \
            --scope backend-v2-image \
            --report backend-v2.trivy.json \
            --output backend-v2.scan-predicate.json \
            --artifact-name "$ARTIFACT_NAME" \
            --artifact-digest "$IMAGE_DIGEST" \
            --artifact-type container_image \
            --report-artifact-name backend-v2.oci.tar \
            --source-git-sha "$GITHUB_SHA" \
            --tree-hash "${{ steps.source.outputs.tree_hash }}"

      - name: Generate SPDX SBOM from the exact OCI archive
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          version: v0.69.3
          scan-type: image
          input: backend-v2.oci
          format: spdx-json
          output: backend-v2.spdx.json
          exit-code: "0"

      - name: Validate immutable evidence set
        run: |
          jq -e '.spdxVersion and .documentNamespace and ((.packages // []) | length > 0)' backend-v2.spdx.json >/dev/null
          jq -e --arg digest "${{ steps.build.outputs.digest }}" \
            '.schema_version == 2 and .artifact.digest == $digest and .result == "pass"' \
            backend-v2.scan-predicate.json >/dev/null

      - name: Retain OCI archive, report, predicate and SBOM
        id: evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-v2-security-evidence-${{ github.sha }}
          path: |
            backend-v2.oci.tar
            backend-v2.spdx.json
            backend-v2.trivy.json
            backend-v2.scan-predicate.json
          if-no-files-found: error
          retention-days: 90
          compression-level: 0

      - name: Record publication boundary
        run: |
          {
            echo "### backend-v2 validated artifact"
            echo "- source: \`${GITHUB_SHA}\`"
            echo "- image digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- evidence artifact id: \`${{ steps.evidence.outputs.artifact-id }}\`"
            echo "- evidence digest: \`${{ steps.evidence.outputs.artifact-digest }}\`"
            echo "- publication: **BLOCKED_EXTERNAL**"
          } >> "$GITHUB_STEP_SUMMARY"
