name: Build and Push Backend V2

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-and-push.yml"
      - "backend/Dockerfile.v2"
      - "backend/docker-entrypoint-v2.sh"
      - "backend/requirements-v2.txt"
      - "backend/sealai_v2/**"
      - "ops/release-backend-v2.sh"
      - "ops/production-release-gate-check.sh"
      - "ops/production_release_gate.py"
      - "ops/production-release-state.json"
      - "ops/tree-hash.sh"
      - "ops/verify-image-attestations.sh"
      - "ops/verify_attestation_payload.py"
  workflow_dispatch:
    inputs:
      source_sha:
        description: "Commit to build (defaults to the selected ref)"
        required: false
        type: string

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND_V2: ${{ github.repository_owner }}/sealai-backend-v2

jobs:
  push:
    name: Build and push immutable backend-v2 image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source at the requested commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha || github.sha }}

      - name: Enforce release freeze before image build or publication
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        run: |
          set -euo pipefail
          # shellcheck source=ops/production-release-gate-check.sh
          source "$PWD/ops/production-release-gate-check.sh"
          production_release_gate_check \
            "$PWD/ops/production_release_gate.py" build

      - name: Compute served tree hash
        id: source
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          tree_hash="$(/bin/bash -p ops/tree-hash.sh)"
          test -n "$tree_hash"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=${sha:0:8}" >> "$GITHUB_OUTPUT"
          echo "tree_hash=$tree_hash" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push backend-v2
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: backend
          file: backend/Dockerfile.v2
          platforms: linux/amd64
          push: true
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=backend-v2
          cache-to: type=gha,mode=max,scope=backend-v2
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND_V2 }}:${{ steps.source.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND_V2 }}:${{ steps.source.outputs.sha }}
          build-args: |
            GATE_TREE_HASH=${{ steps.source.outputs.tree_hash }}
            SOURCE_GIT_SHA=${{ steps.source.outputs.sha }}
          labels: |
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            io.sealai.served-tree-hash=${{ steps.source.outputs.tree_hash }}

      - name: Extract and validate pushed SPDX SBOM
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_BACKEND_V2}@${IMAGE_DIGEST}"
          docker buildx imagetools inspect "$image" \
            --format '{{ json .SBOM.SPDX }}' > backend-v2.spdx.json
          jq -e \
            '.spdxVersion and .documentNamespace and ((.packages // []) | length > 0)' \
            backend-v2.spdx.json >/dev/null

      - name: Sign build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND_V2 }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Sign SPDX SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND_V2 }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: backend-v2.spdx.json
          push-to-registry: true

      - name: Publish artifact coordinates
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        run: |
          {
            echo "### backend-v2 artifact"
            echo "- commit: \`${{ steps.source.outputs.sha }}\`"
            echo "- tree hash: \`${{ steps.source.outputs.tree_hash }}\`"
            echo "- image tag: \`${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND_V2 }}:${{ steps.source.outputs.sha }}\`"
            echo "- image digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- supply chain: BuildKit OCI provenance/SBOM plus GitHub-signed provenance and SPDX SBOM"
          } >> "$GITHUB_STEP_SUMMARY"
