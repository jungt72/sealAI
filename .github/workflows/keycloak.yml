name: Keycloak 26.7

on:
  pull_request:
    paths:
      - "keycloak/**"
      - "docker-compose.dev.yml"
      - "docker-compose.deploy.yml"
      - ".env.example"
      - ".env.prod.example"
      - "nginx/default.conf"
      - "ops/check-env-drift.sh"
      - "ops/keycloak_*.sh"
      - "ops/production-release-gate-check.sh"
      - "ops/production_release_gate.py"
      - "ops/production-release-state.json"
      - ".github/workflows/keycloak.yml"
  push:
    branches: [main]
    paths:
      - "keycloak/**"
      - "docker-compose.dev.yml"
      - "docker-compose.deploy.yml"
      - ".env.example"
      - ".env.prod.example"
      - "nginx/default.conf"
      - "ops/check-env-drift.sh"
      - "ops/keycloak_*.sh"
      - "ops/production-release-gate-check.sh"
      - "ops/production_release_gate.py"
      - "ops/production-release-state.json"
      - ".github/workflows/keycloak.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository_owner }}/sealai-keycloak

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate operational scripts and Compose model
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        run: |
          set -euo pipefail
          bash -n ops/keycloak_ensure_roles.sh
          bash -n ops/keycloak_recover_admin.sh
          bash -n ops/keycloak_upgrade_preflight.sh
          docker compose -f docker-compose.yml -f docker-compose.deploy.yml config --no-interpolate >/dev/null

      - name: Set up Docker Buildx
        if: github.event_name == 'pull_request'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Validate Keycloak image build
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: keycloak
          file: keycloak/Dockerfile
          platforms: linux/amd64
          push: false
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=keycloak-26-7

  publish:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enforce release freeze before image build or publication
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        run: |
          set -euo pipefail
          # shellcheck source=ops/production-release-gate-check.sh
          source "$PWD/ops/production-release-gate-check.sh"
          production_release_gate_check \
            "$PWD/ops/production_release_gate.py" build

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build immutable Keycloak image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: keycloak
          file: keycloak/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=keycloak-26-7
          cache-to: type=gha,mode=max,scope=keycloak-26-7
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=26.7.0

      - name: Extract and validate pushed SPDX SBOM
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE}@${IMAGE_DIGEST}"
          docker buildx imagetools inspect "$image" \
            --format '{{ json .SBOM.SPDX }}' > keycloak.spdx.json
          jq -e \
            '.spdxVersion and .documentNamespace and ((.packages // []) | length > 0)' \
            keycloak.spdx.json >/dev/null

      - name: Sign build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Sign SPDX SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: keycloak.spdx.json
          push-to-registry: true

      - name: Publish artifact coordinates
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        run: |
          {
            echo "### Keycloak 26.7.0 artifact"
            echo "- commit: \`${{ github.sha }}\`"
            echo "- image: \`${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}\`"
            echo "- digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- supply chain: BuildKit OCI provenance/SBOM plus GitHub-signed provenance and SPDX SBOM"
          } >> "$GITHUB_STEP_SUMMARY"
