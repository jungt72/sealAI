name: Keycloak 26.7 Validation

on:
  pull_request:
    paths:
      - "keycloak/**"
      - "docker-compose*.yml"
      - "ops/keycloak_*.sh"
      - "security/**"
      - ".github/workflows/keycloak.yml"
  push:
    branches: [main]
    paths:
      - "keycloak/**"
      - "docker-compose*.yml"
      - "ops/keycloak_*.sh"
      - "security/**"
      - ".github/workflows/keycloak.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-build-scan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout exact unprivileged validation commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate scripts and Compose syntax
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$GITHUB_SHA" ]]
          bash -n ops/keycloak_ensure_roles.sh
          bash -n ops/keycloak_recover_admin.sh
          bash -n ops/keycloak_upgrade_preflight.sh
          docker compose -f docker-compose.yml -f docker-compose.deploy.yml config --no-interpolate >/dev/null

      - name: Enforce release freeze for main release-shaped builds
        if: github.ref == 'refs/heads/main'
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        run: |
          set -euo pipefail
          source "$PWD/ops/production-release-gate-check.sh"
          production_release_gate_check \
            "$PWD/ops/production_release_gate.py" build

      - name: Bind source tree
        id: source
        run: |
          tree_hash="$(git rev-parse "${GITHUB_SHA}:keycloak")"
          [[ "$tree_hash" =~ ^[0-9a-f]{40}$ ]]
          echo "tree_hash=$tree_hash" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build immutable Keycloak OCI archive without credentials
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: keycloak
          file: keycloak/Dockerfile
          platforms: linux/amd64
          push: false
          provenance: mode=max
          sbom: true
          outputs: type=oci,dest=keycloak.oci.tar
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=26.7.0

      - name: Scan exact Keycloak archive
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          version: v0.69.3
          scan-type: image
          input: keycloak.oci.tar
          scanners: vuln,license
          trivy-config: security/trivy.yaml
          format: json
          output: keycloak.trivy.json
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: "0"

      - name: Create artifact-bound Keycloak scan predicate
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          python3 ops/supply_chain_gate.py create-scan-predicate \
            --scope keycloak-image \
            --report keycloak.trivy.json \
            --output keycloak.scan-predicate.json \
            --artifact-name ghcr.io/jungt72/sealai-keycloak \
            --artifact-digest "$IMAGE_DIGEST" \
            --artifact-type container_image \
            --report-artifact-name keycloak.oci.tar \
            --source-git-sha "$GITHUB_SHA" \
            --tree-hash "${{ steps.source.outputs.tree_hash }}"

      - name: Generate exact Keycloak SPDX SBOM
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          version: v0.69.3
          scan-type: image
          input: keycloak.oci.tar
          format: spdx-json
          output: keycloak.spdx.json
          exit-code: "0"

      - name: Retain immutable Keycloak evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: keycloak-security-evidence-${{ github.sha }}
          path: |
            keycloak.oci.tar
            keycloak.spdx.json
            keycloak.trivy.json
            keycloak.scan-predicate.json
          if-no-files-found: error
          retention-days: 90
          compression-level: 0

      - name: Record disabled publication boundary
        run: echo "publication=BLOCKED_EXTERNAL" >> "$GITHUB_STEP_SUMMARY"
