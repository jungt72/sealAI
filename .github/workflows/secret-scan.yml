name: Secret Scan

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Commit-range scanning must see every commit introduced by a PR/push.
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install pinned control-test dependencies
        run: python -m pip install "pytest==8.4.2" "PyYAML==6.0.3"

      - name: Secret scanner and remediation-control tests
        run: |
          python -m pytest \
            backend/tests/test_secret_hygiene_classifier.py \
            backend/tests/test_remediation_control.py \
            --noconftest -q

      - name: Scan checked-out tree (values redacted)
        run: python3 ops/check-secret-hygiene.py --tree "$GITHUB_SHA"

      - name: Scan every introduced commit (values redacted)
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -eu
          revision_range="$(python3 ops/resolve-secret-scan-range.py \
            --event "$EVENT_NAME" \
            --before "${BEFORE_SHA:-}" \
            --after "${AFTER_SHA:-}" \
            --base "${BASE_SHA:-}" \
            --head "${HEAD_SHA:-}" \
            --default-ref "refs/remotes/origin/$DEFAULT_BRANCH" \
            --ref-name "$REF_NAME" \
            --default-branch "$DEFAULT_BRANCH")"

          python3 ops/check-secret-hygiene.py --range "$revision_range"
