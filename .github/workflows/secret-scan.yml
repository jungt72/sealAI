name: Secret Scan

# Audit #3 Risk #1: a real Keycloak client secret was committed (client.json). After
# rotation + untracking, this guard fails CI if a secret-like value is re-committed to
# a tracked file. It scans only TRACKED files and prints filenames only — the matched
# value is never echoed into the CI log.

on:
  push:
  pull_request:

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Scan tracked files for committed secrets (values redacted)
        run: |
          # Key must be exactly a secret-ish name, value a 20+ char token. Example /
          # sample / md / *.prod.example files are excluded (placeholders by design).
          PATTERN='"(secret|client_secret|clientSecret|password|passwd|api[_-]?key|apikey|token|access_token|private_key)"[[:space:]]*:[[:space:]]*"[A-Za-z0-9._/+=-]{20,}"'
          matches="$(git grep -lEI "$PATTERN" \
            -- ':(exclude)*.example' ':(exclude)*.sample' ':(exclude)*.md' \
               ':(exclude)*.prod.example' 2>/dev/null || true)"
          if [ -n "$matches" ]; then
            echo "::error::Committed secret-like value(s) detected in tracked files (values redacted):"
            echo "$matches"
            echo "Rotate the secret, remove it from the tree, and inject it at runtime via env instead."
            exit 1
          fi
          echo "No committed secrets detected in tracked files."
