name: V2 Contracts

# V2.0 Phase-0 CI — scoped to the green-field sealai_v2 tree (Option B coexistence).
# Runs the import-purity boundary keystone (build-spec §11) and the v2 eval slot.
# Pure-stdlib AST + an intentionally-empty eval/ placeholder → only pytest is needed,
# no ML / runtime stack. Kept as its own workflow file so all v2 CI is isolated and
# can be deleted wholesale when v2 lands (or removed cleanly if v2 is abandoned).

on:
  push:
  pull_request:

jobs:
  v2-contracts:
    name: v2-contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest (light — no runtime stack)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pytest~=8.4.2"

      # Keystone: no sealai_v2.* imports app.*, and no app.* imports sealai_v2.*.
      - name: Import-purity boundary (sealai_v2 <-> app)
        run: |
          python -m pytest backend/tests/architecture/test_v2_import_boundary.py --noconftest

      # V2 eval harness slot. eval/ is intentionally empty in Phase 0, so pytest
      # collects nothing -> exit code 5; treat that (and only that) as green. Becomes a
      # real hard-red gate the moment M1 adds eval cases under sealai_v2/eval/.
      - name: V2 eval placeholder (tolerate empty collection)
        run: |
          set +e
          python -m pytest backend/sealai_v2 --noconftest -q
          rc=$?
          if [ "$rc" -eq 5 ]; then
            echo "No v2 tests collected yet (eval/ placeholder) — OK for Phase 0."
            exit 0
          fi
          exit "$rc"
