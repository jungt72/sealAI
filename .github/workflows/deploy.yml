name: Deploy Backend V2 (Blocked External)

on:
  workflow_dispatch:

# Production deployment is mechanically unavailable. The previous workflow
# accepted arbitrary control commits and image repositories. Re-enabling it
# requires independently verifiable protected-main, environment approval and
# immutable producer-artifact evidence; repository assertions are insufficient.
permissions: {}

jobs:
  deploy-blocked-external:
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Refuse production mutation without external trust proof
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        run: |
          echo "BLOCKED_EXTERNAL: production publisher/deployer is disabled" >&2
          echo "No checkout, registry credential, OIDC token, SSH secret or production command is reachable." >&2
          exit 2
