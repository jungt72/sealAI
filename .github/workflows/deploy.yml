name: Deploy Backend V2

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: "Exact main commit whose image was built"
        required: true
        type: string
      backend_image:
        description: "Optional fully qualified image ref; otherwise GHCR commit tag"
        required: false
        type: string

permissions:
  contents: read
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND_V2: ${{ github.repository_owner }}/sealai-backend-v2

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Resolve source commit
        id: source
        shell: bash
        env:
          INPUT_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          sha="${INPUT_SHA}"
          [[ "$sha" =~ ^[0-9a-f]{40}$ ]] || { echo "invalid source SHA" >&2; exit 2; }
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=${sha:0:8}" >> "$GITHUB_OUTPUT"

      - name: Resolve and pin backend-v2 image
        id: image
        shell: bash
        env:
          INPUT_IMAGE: ${{ inputs.backend_image }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_BACKEND_V2: ${{ env.IMAGE_BACKEND_V2 }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          set -euo pipefail
          ref="${INPUT_IMAGE:-${REGISTRY}/${IMAGE_BACKEND_V2}:${SOURCE_SHA}}"
          if [[ "$ref" == *@sha256:* ]]; then
            pinned="$ref"
          else
            digest="$(docker buildx imagetools inspect "$ref" --format '{{.Manifest.Digest}}')"
            test -n "$digest"
            pinned="${ref}@${digest}"
          fi
          echo "ref=$pinned" >> "$GITHUB_OUTPUT"

      - name: Deploy through the sanctioned V2 release gate
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          EXPECTED_SHA: ${{ steps.source.outputs.sha }}
          BACKEND_V2_IMAGE: ${{ steps.image.outputs.ref }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: EXPECTED_SHA,BACKEND_V2_IMAGE
          script: |
            set -euo pipefail
            cd /home/thorsten/sealai
            test -z "$(git status --porcelain)" || {
              echo "refusing deploy: VPS worktree is dirty before promotion" >&2
              git status --short --branch >&2
              exit 21
            }
            git fetch --prune origin main
            test "$(git rev-parse origin/main)" = "$EXPECTED_SHA" || {
              echo "refusing deploy: artifact is no longer the current origin/main" >&2
              exit 20
            }
            git checkout --detach "$EXPECTED_SHA"
            test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
            BACKEND_V2_IMAGE="$BACKEND_V2_IMAGE" ./ops/release-backend-v2.sh --final
