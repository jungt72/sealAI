name: Deploy Backend V2 (Blocked External)

on:
  workflow_dispatch:

# Production deployment is mechanically unavailable. The root-owned P1
# promotion boundary, release freeze, Gate-10 source/control binding and digest
# checks remain mandatory, but CI cannot reach them until protected-main,
# environment approval and immutable producer-artifact evidence are verified
# independently of repository-controlled code.
permissions: {}

jobs:
  deploy-blocked-external:
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Refuse production mutation without external trust proof
        shell: /bin/bash --noprofile --norc -p -e -o pipefail {0}
        run: |
          echo "BLOCKED_EXTERNAL: production publisher/deployer is disabled" >&2
          echo "No checkout, registry credential, OIDC token, SSH secret or production command is reachable." >&2
          exit 2
