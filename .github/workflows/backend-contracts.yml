name: Backend Contracts

# Audit #3 Risk #2: the architecture enforcers + the fast doctrine guard suite are
# the repo's "executable contracts" (CORE_PACK_BOUNDARY.md, .claude/rules/testing.md),
# but they only ran in the local PreToolUse hook (ops/hooks/doctrine-gate.sh) — never
# in CI. A regression could therefore merge green. This job runs them on every push and
# pull_request so the contracts are mechanically enforced.
#
# Deliberately light: the architecture enforcers are pure-stdlib AST parsers, and the
# doctrine/seam targets import only pydantic (backend/conftest.py stubs structlog,
# asyncpg, jinja2, jose, langchain_core, multipart at collection time). So no ML /
# runtime stack is installed — the suite runs in seconds. Imports resolve via
# PYTHONPATH (the `app` package is not pip-installed), matching AGENTS.md's test form.

on:
  push:
  pull_request:

jobs:
  backend-contracts:
    name: backend-contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install contract-test deps (light — pinned to match backend/requirements*)
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "pytest~=8.4.2" \
            "pytest-asyncio==0.23.7" \
            "pydantic==2.12.5" \
            "pydantic-settings==2.13.1"

      # The architecture enforcers are pure-stdlib AST parsers and import no `app`
      # code, so they run with --noconftest: that skips backend/tests/conftest.py
      # (a DB-fixtures conftest that imports sqlalchemy) which is otherwise loaded
      # for the backend/tests/ subtree and would need the full runtime stack.
      - name: Architecture enforcers (pure-AST, no conftest / no deps)
        run: |
          python -m pytest backend/tests/architecture --noconftest

      # V2.0 Phase-0 keystone (build-spec §11): the sealai_v2 ↔ app import boundary
      # that keeps the green-field tree cleanly deletable during Option-B coexistence.
      # Already covered by the architecture glob above, but named explicitly so this
      # hard-red gate is unmistakable and survives a future change to that glob.
      - name: V2 import-purity boundary (keystone)
        run: |
          python -m pytest backend/tests/architecture/test_v2_import_boundary.py --noconftest
