name: Agent BFF Guardrails

on:
  push:
  pull_request:

jobs:
  agent-bff-guardrails:
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ci-guardrail-secret
      NEXTAUTH_SECRET: ci-guardrail-secret
      AUTH_TRUST_HOST: true
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep curl jq

      - name: v2-only code guardrail
        run: ./ops/check_no_langgraph_v1.sh

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Smoke test Agent BFF routes (no token)
        run: |
          cd frontend
          node .next/standalone/server.js &
          START_PID=$!
          trap "kill $START_PID" EXIT
          sleep 10
          cd ..
          BASE_URL=http://localhost:3000 ./ops/smoke_langgraph_v2_bff.sh

  # Re-debt guard for backend formatting (P1-7 addendum, 2026-06-04): keeps
  # backend/ ruff-format-clean after the bulk format. Deliberate small, scoped
  # exception to the otherwise-parked CI-trigger strategy. NOT a required check
  # in branch protection (that stays parked) — informational, blocks re-debt on
  # the PR. Scoped to backend/ only; legacy dirs (seo/, archive/, langgraph_backup/)
  # are intentionally excluded.
  backend-ruff-format:
    name: backend ruff-format (re-debt guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff (pinned — matches requirements-dev)
        run: python -m pip install ruff==0.6.9
      - name: ruff format --check backend/
        run: ruff format --check backend/
