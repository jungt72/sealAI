name: Agent BFF Guardrails

on:
  push:
  pull_request:

jobs:
  agent-bff-guardrails:
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ci-guardrail-secret
      NEXTAUTH_SECRET: ci-guardrail-secret
      AUTH_TRUST_HOST: true
      NEXTAUTH_URL: http://127.0.0.1:3100
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep curl jq

      - name: v2-only code guardrail
        run: ./ops/check_no_langgraph_v1.sh

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install --legacy-peer-deps --no-fund --no-audit
          npm run build

      - name: Smoke test Agent BFF routes (no token)
        run: |
          cd frontend
          PORT=3100 HOSTNAME=127.0.0.1 node .next/standalone/frontend/server.js &
          START_PID=$!
          trap "kill $START_PID" EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3100/api/health >/dev/null 2>&1; then
              break
            fi
            if [[ $i -eq 30 ]]; then
              echo "FAIL: frontend standalone did not become healthy in time" >&2
              exit 1
            fi
            sleep 2
          done
          cd ..
          BASE_URL=http://127.0.0.1:3100 ./ops/smoke_langgraph_v2_bff.sh
