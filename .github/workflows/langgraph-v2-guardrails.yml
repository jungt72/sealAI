name: Backend ruff-format guard

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # Re-debt guard for backend formatting (P1-7 addendum, 2026-06-04): keeps
  # backend/ ruff-format-clean after the bulk format. Deliberate small, scoped
  # exception to the otherwise-parked CI-trigger strategy. It is listed in the
  # canonical required-check inventory; external enforcement remains
  # BLOCKED_EXTERNAL. Scoped to backend/ only; legacy dirs (seo/, archive/,
  # langgraph_backup/) are intentionally excluded.
  backend-ruff-format:
    name: backend ruff-format (re-debt guard)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install hash-locked formatter
        run: python -m pip install --require-hashes -r backend/requirements-ci.lock
      - name: ruff format --check backend/
        run: ruff format --check backend/
