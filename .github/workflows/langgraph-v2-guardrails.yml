name: LangGraph v2 Guardrails

on:
  push:
  pull_request:

jobs:
  langgraph-v2-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep curl jq

      - name: v2-only code guardrail
        run: ./ops/check_no_langgraph_v1.sh

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Smoke test BFF routes (no token)
        run: |
          cd frontend
          npm run start -- --port 3000 &
          START_PID=$!
          trap "kill $START_PID" EXIT
          sleep 10
          cd ..
          BASE_URL=http://localhost:3000 ./ops/smoke_langgraph_v2_bff.sh
