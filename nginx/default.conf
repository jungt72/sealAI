##
## NGINX Reverse Proxy für SealAI
##

# HTTP: ACME + Redirect
server {
  listen 80;
  listen [::]:80;
  server_name sealai.net www.sealai.net auth.sealai.net;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
  }

  # simple HTTP health (nur für 80)
  location = /health { return 200 'ok'; add_header Content-Type text/plain; }

  return 301 https://$host$request_uri;
}

# HTTPS Hauptdomain
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name sealai.net www.sealai.net;

  ssl_certificate     /etc/letsencrypt/live/sealai.net/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/sealai.net/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ---------------------------------------------------------------------------
  # Canonical routing: /chat -> /dashboard
  # ---------------------------------------------------------------------------
  location = /chat  { return 307 /dashboard; }
  location = /chat/ { return 307 /dashboard; }

  location ^~ /chat/ {
    rewrite ^/chat/([^/?#]+)/?$ /dashboard?chat_id=$1 redirect;
    return 307 /dashboard;
  }

  # ---------------------------------------------------------------------------
  # Health (HTTPS) -> Backend LangGraph Health
  # ---------------------------------------------------------------------------
  location = /health {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://backend:8000/api/v1/langgraph/health;
  }

  # NextAuth
  location ^~ /api/auth/ {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_buffer_size       256k;
    proxy_buffers           16 256k;
    proxy_busy_buffers_size 512k;

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_pass http://frontend:3000;
  }

  # Strapi Platzhalter
  location = /admin { return 301 /admin/; }
  location ^~ /admin/ {
    add_header Content-Type text/plain;
    return 502 "Strapi admin interface is not configured in this stack.";
  }

  # SSE: /api/chat -> backend chat/v2
  location = /api/chat {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization     $http_authorization;
    proxy_set_header Connection        "";

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_cache off;
    gzip off;

    chunked_transfer_encoding on;
    add_header X-Accel-Buffering no;
    add_header Cache-Control "no-cache, no-transform";

    proxy_pass http://backend:8000/api/v1/langgraph/chat/v2;
  }

  # SSE legacy: /api/langgraph/chat -> backend chat/v2
  location = /api/langgraph/chat {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization     $http_authorization;
    proxy_set_header Connection        "";

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_cache off;
    gzip off;

    chunked_transfer_encoding on;
    add_header X-Accel-Buffering no;
    add_header Cache-Control "no-cache, no-transform";

    proxy_pass http://backend:8000/api/v1/langgraph/chat/v2;
  }
  location = /api/langgraph/chat/ { return 307 /api/langgraph/chat; }

  # /api/langgraph/* -> /api/v1/langgraph/*
  location ^~ /api/langgraph/ {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization     $http_authorization;
    proxy_set_header Connection        "";

    proxy_buffering off;
    proxy_request_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    chunked_transfer_encoding on;
    add_header X-Accel-Buffering no;
    add_header Cache-Control "no-cache, no-transform";

    proxy_pass http://backend:8000/api/v1/langgraph/;
  }

  # Backend REST: /api/v1/*
  location ^~ /api/v1/ {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization     $http_authorization;

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    proxy_pass http://backend:8000/api/v1/;
  }

  # Strapi public Platzhalter
  location = /strapi { return 301 https://$host/strapi/; }
  location ^~ /strapi/ {
    add_header Content-Type text/plain;
    return 502 "Strapi public API is not configured in this stack.";
  }
  location ^~ /uploads/ {
    add_header Content-Type text/plain;
    return 502 "Strapi uploads are not configured in this stack.";
  }

  # Frontend
  location / {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    proxy_pass http://frontend:3000;
  }
}

# HTTPS Auth-Subdomain → Keycloak
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name auth.sealai.net;

  ssl_certificate     /etc/letsencrypt/live/auth.sealai.net/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/auth.sealai.net/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Management health endpoints live on 9000
  location = /health/ready {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port  443;
    proxy_pass http://keycloak:9000/health/ready;
  }

  location = /health/live {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port  443;
    proxy_pass http://keycloak:9000/health/live;
  }

  # everything else -> Keycloak app port 8080
  location / {
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port  443;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_read_timeout 300s;

    proxy_redirect ~^https?://localhost(/.*)$ https://auth.sealai.net$1;

    proxy_pass http://keycloak:8080;
  }
}
