# /etc/nginx/conf.d/default.conf
#
# Central reverse proxy for sealingai.com platform services.
# Active services in current restore state:
# - sealingai.com / www.sealingai.com
# - Keycloak OIDC paths under sealingai.com
# - erp.sealai.net
# - dms.sealai.net
# - crm.sealai.net
#
# Notes:
# - The public Next.js frontend runs as Docker service `frontend` and is reached via Docker DNS `frontend:3000`.
# - Internal platform services are reached through Docker DNS by service name.
# - All HTTP traffic is redirected to HTTPS.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name sealingai.com www.sealingai.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 308 https://sealingai.com$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name sealai.net www.sealai.net;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 308 https://sealingai.com$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name sealingai.de www.sealingai.de;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 308 https://sealingai.com$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name sealai.net www.sealai.net;

    ssl_certificate     /etc/letsencrypt/live/sealai.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sealai.net/privkey.pem;

    return 308 https://sealingai.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name sealingai.de;

    ssl_certificate     /etc/letsencrypt/live/sealingai.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sealingai.de/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    return 308 https://sealingai.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.sealingai.com;

    ssl_certificate     /etc/letsencrypt/live/sealingai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sealingai.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    return 308 https://sealingai.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name sealingai.com;
    include snippets/v2_dashboard.conf;  # V2-CUTOVER (ops/v2-flip.sh)

    ssl_certificate     /etc/letsencrypt/live/sealingai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sealingai.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location = /api/health {
        proxy_pass http://sealai-frontend:3000/api/health;
        proxy_http_version 1.1;

        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location = /api/agent/health {
        # V1 agent health RETIRED 2026-06-25 (backend → profile v1-legacy; was proxy_pass to the
        # now-unresolvable sealai-backend:8000). 410 Gone.
        return 410;
    }

    location ^~ /realms/ {
        proxy_pass http://sealai-keycloak:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_redirect off;
    }

    location ^~ /resources/ {
        proxy_pass http://sealai-keycloak:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_redirect off;
    }

    location ^~ /login-actions/ {
        proxy_pass http://sealai-keycloak:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_redirect off;
    }

    location ^~ /admin/ {
        proxy_pass http://sealai-keycloak:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_redirect off;
    }

    location ^~ /api/auth/ {
        proxy_pass http://sealai-frontend:3000;
        proxy_http_version 1.1;

        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
    }

    location ^~ /api/ {
        # V1 agent API RETIRED 2026-06-25 (backend → compose profile v1-legacy). This was
        # proxy_pass http://sealai-backend:8000 — now a literal-unresolvable upstream that would
        # break nginx reload/restart (latent site-down). 410 Gone. The more-specific /api/auth,
        # /api/bff, /api/v2 locations match first and are unaffected.
        return 410;
    }

    # DORMANT — V2.0 cutover upstream (defined, not routed). The backend-v2 service
    # is off by default (docker-compose.v2.yml, profile `v2`), so nginx must NOT try
    # to resolve sealai-backend-v2 at startup — a literal proxy_pass to an absent host
    # breaks `nginx -t` / reload. This block therefore stays COMMENTED until the v2
    # cutover. To enable: uncomment (and switch to a resolver + variable proxy_pass if
    # the upstream may still be absent) to route /api/v2/ at the green-field backend.
    # location ^~ /api/v2/ {
    #     proxy_pass http://sealai-backend-v2:8001;
    #     proxy_http_version 1.1;
    #
    #     proxy_set_header Connection "";
    #     proxy_buffering off;
    #     proxy_cache off;
    #     chunked_transfer_encoding on;
    #     tcp_nopush on;
    #     tcp_nodelay on;
    #     keepalive_timeout 65;
    #
    #     proxy_set_header Host              $host;
    #     proxy_set_header X-Real-IP         $remote_addr;
    #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header X-Forwarded-Host  $host;
    #     proxy_set_header X-Forwarded-Port  $server_port;
    #
    #     proxy_read_timeout 300s;
    #     proxy_send_timeout 300s;
    # }

    location ^~ /_next/ {
        proxy_pass http://sealai-frontend:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }

    location / {
        proxy_pass http://sealai-frontend:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name auth.sealai.net;

    ssl_certificate     /etc/letsencrypt/live/auth.sealai.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.sealai.net/privkey.pem;

    return 308 https://sealingai.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name erp.sealai.net;

    ssl_certificate     /etc/letsencrypt/live/erp.sealai.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.sealai.net/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location / {
        # resilient upstream 2026-06-25: erpnext-web may be ABSENT (ERP stack down) → a literal
        # proxy_pass would crash nginx at startup. Variable + resolver = resolve at request-time
        # (502 if down), nginx still starts. (Pre-existing landmine, exposed by the V1-retire restart.)
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $up_erp erpnext-web:8080;
        proxy_pass http://$up_erp;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 50M;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name crm.sealai.net;

    ssl_certificate     /etc/letsencrypt/live/crm.sealai.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.sealai.net/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ACME challenge — statisch aus Webroot
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        # resilient upstream 2026-06-25: crm-web may be ABSENT → variable + resolver so nginx starts.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $up_crm crm-web:8080;
        proxy_pass http://$up_crm;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 50M;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dms.sealai.net;

    ssl_certificate     /etc/letsencrypt/live/dms.sealai.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dms.sealai.net/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Embedded Docker DNS + a variable proxy_pass (same pattern as snippets/v2_dashboard.conf) — a
    # bare `proxy_pass http://paperless:8000` resolves the hostname ONCE at worker-process start and
    # then caches that IP for the worker's lifetime; a paperless container recreate (new IP) then 502s
    # every request until nginx itself is reloaded (the 2026-07-01 incident). The resolver + variable
    # forces a fresh lookup within `valid`'s TTL instead.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $paperless_upstream http://paperless:8000;
        proxy_pass $paperless_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        client_max_body_size 100M;
    }
}
