##
## NGINX Reverse Proxy für SealAI
##

# Upgrade/Connection sauber für WebSockets (und harmless für normale Requests)
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

log_format sealai_main
  '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent '
  '"$http_referer" "$http_user_agent" '
  'ua="$upstream_addr" us="$upstream_status" urt="$upstream_response_time" '
  'next_action="$http_next_action" rsc="$http_rsc"';

access_log /var/log/nginx/access.log sealai_main;

# -----------------------------------------------------------------------------
# HTTP (80): ACME (NO redirect) + Redirect für alles andere
# -----------------------------------------------------------------------------
server {
  listen 80;
  listen [::]:80;
  server_name sealai.net www.sealai.net auth.sealai.net;

  # ACME challenge darf NIEMALS redirected werden
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    try_files $uri =404;
  }

  location = /health {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# -----------------------------------------------------------------------------
# HTTPS Hauptdomain (sealai.net + www)
# -----------------------------------------------------------------------------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name sealai.net www.sealai.net;

  ssl_certificate     /etc/letsencrypt/live/sealai.net/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/sealai.net/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location = /chat  { return 307 /dashboard; }
  location = /chat/ { return 307 /dashboard; }

  location ^~ /chat/ {
    rewrite ^/chat/([^/?#]+)/?$ /dashboard?chat_id=$1 redirect;
    return 307 /dashboard;
  }

  location = /health {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://backend:8000/api/v1/langgraph/health;
  }

  location ^~ /api/auth/ {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_buffer_size       256k;
    proxy_buffers           16 256k;
    proxy_busy_buffers_size 512k;

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_pass http://frontend:3000;
  }

  location = /admin { return 301 /admin/; }
  location ^~ /admin/ {
    add_header Content-Type text/plain;
    return 502 "Strapi admin interface is not configured in this stack.";
  }

  # Root: nur GET/HEAD zulassen
  location = / {
    if ($request_method !~ ^(GET|HEAD)$) { return 405; }

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    proxy_hide_header Cache-Control;
    proxy_hide_header ETag;

    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    expires -1;

    proxy_pass http://frontend:3000;
  }

  location ^~ /_next/static/ {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass http://frontend:3000;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location ^~ /_next/ {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    proxy_hide_header Cache-Control;
    proxy_hide_header ETag;

    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    expires -1;

    proxy_pass http://frontend:3000;
  }

  # Backend API (inkl. SSE)
  location ^~ /api/v1/ {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_buffering off;
    proxy_request_buffering off;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    add_header X-Accel-Buffering "no" always;

    proxy_pass http://backend:8000;
  }

  # Frontend API routes (Next.js)
  location ^~ /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    proxy_pass http://frontend:3000;
  }

  location ^~ /strapi/ {
    add_header Content-Type text/plain;
    return 502 "Strapi is not enabled in this deployment.";
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    proxy_pass http://frontend:3000;
  }
}

# -----------------------------------------------------------------------------
# HTTPS Auth Subdomain (Keycloak)
# -----------------------------------------------------------------------------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name auth.sealai.net;

  ssl_certificate     /etc/letsencrypt/live/auth.sealai.net/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/auth.sealai.net/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

    # Keycloak: außen HTTPS
    proxy_set_header X-Forwarded-Proto https;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_read_timeout 180s;
    proxy_send_timeout 180s;

    proxy_pass http://keycloak:8080;
  }
}
