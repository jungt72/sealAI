# Ops hardening (2026-07-03): a per-client-IP request ceiling on /api/v2/* — the ops/security sweep
# found ZERO rate limiting anywhere in front of the LLM-calling chat/briefing/anfrage endpoints (real
# money per request) or the rest of the V2 API. No CDN/LB sits in front of this host (no real_ip_module
# config), so $binary_remote_addr is the genuine client IP, safe to key on directly.
#
# Sized generously for normal dashboard usage (a chat turn + its panel refreshes fire several requests
# per user action) while still capping a runaway script/bot at a small, bounded multiple of that —
# zero limit today means zero protection against a compromised/malicious authenticated session or an
# unauthenticated scrape hammering the API. `zone=10m` holds ~160k tracked IPs, far more than needed.
limit_req_zone $binary_remote_addr zone=v2api:10m rate=60r/m;
limit_req_status 429;
