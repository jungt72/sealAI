# M7 — V2 client serving + /api/v2 proxy (config-only; NOT applied to prod until the owner-gated
# cutover). CUTOVER: `include snippets/v2_dashboard.conf;` inside the sealingai.com server block,
# replacing the commented /api/v2 stub (default.conf ~:319). Verify with `nginx -t` + a local/staging
# bring-up of backend-v2 — NOT against live sealingai.com. The V2 backend + trust spine are unchanged;
# this only routes the existing /api/v2 + serves the static SPA.

# Embedded Docker DNS — variable proxy_pass so an absent backend-v2 doesn't break nginx startup.
resolver 127.0.0.11 valid=10s ipv6=off;

# --- the V2 client: a static, client-side-routed SPA under /dashboard ---------------------------
location = /dashboard { return 308 /dashboard/; }
location ^~ /dashboard/ {
    alias /usr/share/nginx/v2-client/;          # the built frontend-v2 dist (mounted at cutover)
    try_files $uri /dashboard/index.html;        # SPA fallback (incl. the OIDC /dashboard/callback)

    # Strict CSP — the access token lives in memory; this blocks XSS from exfiltrating it to an
    # external origin (connect-src) and blocks inline script injection (script-src no unsafe-inline).
    # Keycloak is same-origin (https://sealingai.com/realms/...) → 'self' covers token + JWKS fetches.
    # Keycloak is SAME-ORIGIN (https://sealingai.com/realms/... via nginx) → 'self' covers the OIDC
    # token/JWKS fetches (connect-src) AND the prompt=none silent-renewal iframe (frame-src). If
    # Keycloak ever moves to a separate origin, connect-src + frame-src must explicitly allow it.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
}

# --- /api/v2 → the green-field backend (enables the commented stub) ------------------------------
location ^~ /api/v2/ {
    set $v2_upstream http://sealai-backend-v2:8001;
    proxy_pass $v2_upstream;
    include snippets/sealai_proxy_headers.conf;
}
